<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Прозрачность жидкости</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            width: 100%;
            max-width: 550px;
            background: white;
            border-radius: 20px;
            padding: 20px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            position: relative;
        }
        #datetime {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 0.85rem;
            color: #666;
            background: rgba(0,0,0,0.05);
            padding: 4px 10px;
            border-radius: 8px;
            z-index: 10;
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.3rem; color: #2c3e50; }
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin: 15px 0;
        }
        video { width: 100%; height: 100%; object-fit: cover; display: block; }
        .region-selector {
            position: absolute;
            border: 2px dashed #f1c40f;
            background: rgba(241, 196, 15, 0.15);
            pointer-events: none;
            display: none;
            z-index: 5;
        }
        .controls {
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 10px 0;
        }
        button {
            flex: 1 1 auto; min-width: 80px; padding: 10px 8px; border: none; border-radius: 12px;
            background: #3498db; color: white; font-size: 0.9rem; font-weight: 600; cursor: pointer;
            transition: background 0.2s, transform 0.1s; touch-action: manipulation;
        }
        button:active { transform: scale(0.96); }
        button:disabled { background: #bdc3c7; transform: none; }
        .calibrate-btn { background: #27ae60; }
        .record-btn { background: #f39c12; }
        .broadcast-btn { background: #8e44ad; }
        .threshold-row {
            display: flex; align-items: center; justify-content: center; gap: 10px; margin: 10px 0; flex-wrap: wrap;
        }
        .threshold-row input {
            width: 70px; padding: 8px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; text-align: center;
        }
        .warning-text {
            color: #e74c3c; font-weight: bold; font-size: 1.2rem; margin: 5px 0; min-height: 1.5em;
        }
        .result-card {
            background: #f8fafc; border-radius: 16px; padding: 15px; margin-top: 10px;
        }
        .meter {
            width: 100%; height: 24px; background: linear-gradient(to right, #fff, #2c3e50);
            border-radius: 12px; margin: 12px 0; position: relative; overflow: hidden; border: 1px solid #ddd;
        }
        .indicator {
            position: absolute; top: -3px; width: 5px; height: 30px; background: #e74c3c;
            border-radius: 3px; transition: left 0.15s;
        }
        .stats { display: flex; justify-content: space-around; font-size: 1rem; margin: 5px 0; }
        .value { font-weight: 700; font-size: 1.3rem; color: #2c3e50; }
        #statusText { font-size: 0.9rem; color: #7f8c8d; margin-top: 5px; min-height: 1.2em; }
        .history {
            margin-top: 15px; text-align: left; max-height: 150px; overflow-y: auto;
            border-top: 1px solid #eee; padding-top: 10px;
        }
        .history h3 { margin-bottom: 5px; color: #2c3e50; }
        .history-item {
            font-size: 0.8rem; padding: 4px 6px; background: #fff; border-radius: 6px;
            margin-bottom: 3px; display: flex; justify-content: space-between;
        }
        .clear-history {
            font-size: 0.75rem; color: #e74c3c; cursor: pointer; text-decoration: underline;
            background: none; border: none; padding: 0; margin-top: 4px;
        }
        .trend-canvas {
            width: 100%; height: 150px; background: #fff; border-radius: 10px;
            border: 1px solid #ddd; margin-top: 10px;
        }
        .room-block { margin: 10px 0; }
        .room-block input {
            padding: 10px; border-radius: 8px; border: 1px solid #ccc; width: 60%;
            font-size: 1rem; text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="datetime"></div>
        <h1>💧 Прозрачность жидкости</h1>
        <div class="video-wrapper" id="videoWrapper">
            <video id="video" autoplay playsinline muted></video>
            <div id="regionSelector" class="region-selector"></div>
        </div>
        <div class="room-block">
            <input type="text" id="roomInput" placeholder="Имя комнаты">
            <button id="joinRoomBtn">🔗 Войти в комнату</button>
        </div>
        <div class="controls">
            <button id="areaBtn" disabled>🎯 Область</button>
            <button id="resetBtn" disabled>🔄 Сброс</button>
            <button id="calibrateBtn" class="calibrate-btn" disabled>📏 Калибровать</button>
            <button id="recordBtn" class="record-btn" disabled>📝 Записать</button>
        </div>
        <div class="threshold-row">
            <label for="threshold">Порог (0-100%):</label>
            <input type="number" id="threshold" value="70" min="0" max="100" step="1">
        </div>
        <div id="warningMessage" class="warning-text"></div>
        <div class="result-card">
            <div class="stats">
                <span>Прозрачность <span class="value" id="transparencyValue">0%</span></span>
                <span>Яркость <span class="value" id="brightnessValue">0</span></span>
            </div>
            <div class="meter"><div class="indicator" id="indicator" style="left: 0%;"></div></div>
            <div id="statusText">Загрузка камеры...</div>
        </div>
        <canvas id="trendCanvas" class="trend-canvas" width="500" height="150"></canvas>
        <div class="history" id="historyContainer">
            <h3>📋 История измерений</h3>
            <div id="historyList"></div>
            <button class="clear-history" id="clearHistoryBtn">Очистить историю</button>
        </div>
    </div>

    <script>
        // ---------- НАСТРОЙКА: вставьте URL вашей Firebase Realtime Database ----------
        const DB_URL = ‘https://polina-17036-default-rtdb.asia-southeast1.firebasedatabase.app/';
        // ---------------------------------------------------------------------------

        // DOM
        const video = document.getElementById('video');
        const areaBtn = document.getElementById('areaBtn');
        const resetBtn = document.getElementById('resetBtn');
        const calibrateBtn = document.getElementById('calibrateBtn');
        const recordBtn = document.getElementById('recordBtn');
        const joinRoomBtn = document.getElementById('joinRoomBtn');
        const roomInput = document.getElementById('roomInput');
        const transparencyEl = document.getElementById('transparencyValue');
        const brightnessEl = document.getElementById('brightnessValue');
        const indicatorEl = document.getElementById('indicator');
        const statusEl = document.getElementById('statusText');
        const regionSelector = document.getElementById('regionSelector');
        const thresholdInput = document.getElementById('threshold');
        const warningMsg = document.getElementById('warningMessage');
        const datetimeEl = document.getElementById('datetime');
        const historyList = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const trendCanvas = document.getElementById('trendCanvas');
        const ctxTrend = trendCanvas.getContext('2d');

        let stream = null, analysisRegion = null, isSelecting = false, animationId = null;
        let calibrationBrightness = null, currentTransparency = 0, currentBrightness = 0, trendData = [];
        let pc = null, dataChannel = null, isBroadcaster = false;
        let currentRoom = null, unsubscribe = null;

        function updateDateTime() {
            datetimeEl.textContent = new Date().toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' });
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        function drawTrend() {
            ctxTrend.clearRect(0,0,trendCanvas.width,trendCanvas.height);
            if(trendData.length<2) return;
            const w=trendCanvas.width, h=trendCanvas.height, points=trendData.slice(-30), xStep=w/(points.length-1);
            ctxTrend.beginPath(); ctxTrend.strokeStyle='#3498db'; ctxTrend.lineWidth=2;
            for(let i=0;i<points.length;i++) {
                let x=i*xStep, y=h-(points[i].transparency/100)*h;
                i===0?ctxTrend.moveTo(x,y):ctxTrend.lineTo(x,y);
            }
            ctxTrend.stroke();
            let threshold=parseFloat(thresholdInput.value)||70, yTh=h-(threshold/100)*h;
            ctxTrend.beginPath(); ctxTrend.strokeStyle='#e74c3c'; ctxTrend.setLineDash([5,5]);
            ctxTrend.moveTo(0,yTh); ctxTrend.lineTo(w,yTh); ctxTrend.stroke(); ctxTrend.setLineDash([]);
        }

        function addTrendPoint(t) { trendData.push({time:Date.now(), transparency:t}); if(trendData.length>60) trendData.shift(); drawTrend(); }

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video:{facingMode:{ideal:'environment'},width:{ideal:640},height:{ideal:480}}, audio:false
                });
            } catch(e) {
                try { stream = await navigator.mediaDevices.getUserMedia({video:true, audio:false}); }
                catch(err) { statusEl.textContent='❌ Нет доступа к камере'; return; }
            }
            video.srcObject = stream;
            video.onloadedmetadata = () => { video.play(); statusEl.textContent='✅ Камера готова. Введите имя комнаты.';
                areaBtn.disabled=false; calibrateBtn.disabled=false; recordBtn.disabled=false; joinRoomBtn.disabled=false;
                startAnalysis();
            };
        }

        // область (без изменений, только имена функций)
        function getCoords(e) {
            const r=video.getBoundingClientRect(), cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY;
            return {x:cx-r.left, y:cy-r.top, rectWidth:r.width, rectHeight:r.height};
        }
        let sx,sy;
        function pd(e) { if(!isSelecting)return; e.preventDefault(); let p=getCoords(e); sx=p.x; sy=p.y;
            regionSelector.style.display='block'; regionSelector.style.left=p.x+'px'; regionSelector.style.top=p.y+'px';
            regionSelector.style.width='0px'; regionSelector.style.height='0px'; }
        function pm(e) { if(!isSelecting||sx===undefined)return; e.preventDefault(); let p=getCoords(e);
            regionSelector.style.left=Math.min(sx,p.x)+'px'; regionSelector.style.top=Math.min(sy,p.y)+'px';
            regionSelector.style.width=Math.abs(p.x-sx)+'px'; regionSelector.style.height=Math.abs(p.y-sy)+'px'; }
        function pu(e) { if(!isSelecting||sx===undefined)return; e.preventDefault(); let p=getCoords(e);
            let scX=video.videoWidth/p.rectWidth, scY=video.videoHeight/p.rectHeight;
            analysisRegion={ x:Math.min(sx,p.x)*scX, y:Math.min(sy,p.y)*scY, width:Math.abs(p.x-sx)*scX, height:Math.abs(p.y-sy)*scY };
            isSelecting=false; areaBtn.textContent='🎯 Область'; areaBtn.style.background='#3498db'; resetBtn.disabled=false;
            removeListeners(); }
        function addListeners() {
            video.addEventListener('mousedown',pd); video.addEventListener('mousemove',pm); video.addEventListener('mouseup',pu);
            video.addEventListener('touchstart',pd,{passive:false}); video.addEventListener('touchmove',pm,{passive:false}); video.addEventListener('touchend',pu);
        }
        function removeListeners() {
            video.removeEventListener('mousedown',pd); video.removeEventListener('mousemove',pm); video.removeEventListener('mouseup',pu);
            video.removeEventListener('touchstart',pd); video.removeEventListener('touchmove',pm); video.removeEventListener('touchend',pu);
        }

        areaBtn.addEventListener('click', ()=>{
            if(isSelecting){ isSelecting=false; areaBtn.textContent='🎯 Область'; regionSelector.style.display='none'; removeListeners(); return; }
            if(!stream) return; isSelecting=true; areaBtn.textContent='✋ Отменить'; areaBtn.style.background='#e67e22'; addListeners();
        });
        resetBtn.addEventListener('click', ()=>{ analysisRegion=null; regionSelector.style.display='none'; resetBtn.disabled=true; statusEl.textContent='Область сброшена'; });
        calibrateBtn.addEventListener('click', ()=>{ if(!stream) return; calibrationBrightness=currentBrightness; statusEl.textContent=`📏 Калибровка: ${calibrationBrightness.toFixed(1)}=100%`; });

        function addHistoryRecord() {
            let d=new Date(), th=parseFloat(thresholdInput.value)||70, w=currentTransparency<th?'⚠️ WARNING':'✅ Норма';
            let div=document.createElement('div'); div.className='history-item';
            div.innerHTML=`<span>${d.toLocaleTimeString('ru-RU')}</span> <span>${currentTransparency.toFixed(1)}%</span> <span>${w}</span>`;
            historyList.prepend(div);
        }
        recordBtn.addEventListener('click', ()=>{ if(!stream) return; addHistoryRecord(); });
        clearHistoryBtn.addEventListener('click', ()=> historyList.innerHTML='' );

        function analyzeFrame() {
            if(!stream||video.readyState<2) { animationId=requestAnimationFrame(analyzeFrame); return; }
            let c=document.createElement('canvas'); c.width=video.videoWidth; c.height=video.videoHeight;
            let ctx=c.getContext('2d'); ctx.drawImage(video,0,0);
            let imgData;
            if(analysisRegion) {
                let rx=Math.max(0,Math.min(analysisRegion.x,c.width-1)), ry=Math.max(0,Math.min(analysisRegion.y,c.height-1));
                let rw=Math.max(1,Math.min(analysisRegion.width,c.width-rx)), rh=Math.max(1,Math.min(analysisRegion.height,c.height-ry));
                imgData=ctx.getImageData(rx,ry,rw,rh);
            } else imgData=ctx.getImageData(0,0,c.width,c.height);
            let data=imgData.data, total=0;
            for(let i=0;i<data.length;i+=4) total+=0.299*data[i]+0.587*data[i+1]+0.114*data[i+2];
            currentBrightness=total/(data.length/4);
            currentTransparency=calibrationBrightness?Math.min(100,(currentBrightness/calibrationBrightness)*100):Math.min(100,(currentBrightness/255)*100);
            currentTransparency=Math.max(0,currentTransparency);
            transparencyEl.textContent=currentTransparency.toFixed(1)+'%';
            brightnessEl.textContent=currentBrightness.toFixed(1);
            indicatorEl.style.left=currentTransparency+'%';
            warningMsg.textContent=currentTransparency<(parseFloat(thresholdInput.value)||70)?'⚠️ WARNING: Прозрачность ниже порога!':'';
            addTrendPoint(currentTransparency);
            if(dataChannel&&dataChannel.readyState==='open'&&isBroadcaster)
                dataChannel.send(JSON.stringify({transparency:currentTransparency, brightness:currentBrightness}));
            animationId=requestAnimationFrame(analyzeFrame);
        }
        function startAnalysis() { if(animationId) cancelAnimationFrame(animationId); analyzeFrame(); }

        // ---------- Firebase signalling ----------
        async function send(path, data) {
            await fetch(DB_URL + path + '.json', { method:'PUT', body:JSON.stringify(data) });
        }
        function listen(path, callback) {
            let es = new EventSource(DB_URL + path + '.json');
            es.onmessage = e => { if(e.data && e.data!=='null') callback(JSON.parse(e.data)); };
            es.onerror = () => es.close();
            return () => es.close();
        }

        joinRoomBtn.addEventListener('click', async ()=>{
            let room = roomInput.value.trim();
            if(!room) return alert('Введите имя комнаты');
            if(!stream) return alert('Камера не готова');
            if(unsubscribe) unsubscribe();
            if(pc) { pc.close(); pc=null; }
            currentRoom = room;
            statusEl.textContent = 'Входим в комнату...';
            joinRoomBtn.disabled = true;

            // Создаём RTCPeerConnection
            pc = new RTCPeerConnection({ iceServers:[{urls:'stun:stun.l.google.com:19302'}] });
            stream.getTracks().forEach(t=>pc.addTrack(t,stream));

            pc.onicecandidate = e => {
                if(e.candidate) send(`rooms/${room}/ice`, {candidate:e.candidate});
            };
            pc.ontrack = e => {
                video.srcObject = e.streams[0];
                statusEl.textContent = '📡 Видео получено!';
                areaBtn.disabled = true; calibrateBtn.disabled = true;
            };
            pc.ondatachannel = e => {
                dataChannel = e.channel;
                dataChannel.onmessage = ev => {
                    let d = JSON.parse(ev.data);
                    currentTransparency = d.transparency; currentBrightness = d.brightness;
                    transparencyEl.textContent = currentTransparency.toFixed(1)+'%';
                    brightnessEl.textContent = currentBrightness.toFixed(1);
                    indicatorEl.style.left = currentTransparency+'%';
                    addTrendPoint(currentTransparency);
                    warningMsg.textContent = currentTransparency<(parseFloat(thresholdInput.value)||70)?'⚠️ WARNING: Прозрачность ниже порога!':'';
                };
            };

            // Пытаемся создать комнату (offer)
            try {
                // Проверим, существует ли уже offer
                let check = await fetch(DB_URL + `rooms/${room}/offer.json`);
                let hasOffer = await check.json();
                if(!hasOffer) {
                    // Мы вещатель
                    isBroadcaster = true;
                    dataChannel = pc.createDataChannel('transparency');
                    let offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);
                    await send(`rooms/${room}/offer`, pc.localDescription);
                    statusEl.textContent = '📡 Ожидание подключения...';
                    // Слушаем ответ
                    unsubscribe = listen(`rooms/${room}/answer`, async (answer)=>{
                        if(pc.signalingState!=='stable') {
                            await pc.setRemoteDescription(new RTCSessionDescription(answer));
                            statusEl.textContent = '✅ Наблюдатель подключён!';
                        }
                    });
                    // Слушаем ICE от наблюдателя
                    listen(`rooms/${room}/ice`, (c)=>{
                        if(c.candidate) pc.addIceCandidate(new RTCIceCandidate(c.candidate));
                    });
                } else {
                    // Мы наблюдатель
                    isBroadcaster = false;
                    let offer = hasOffer;
                    await pc.setRemoteDescription(new RTCSessionDescription(offer));
                    let answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    await send(`rooms/${room}/answer`, pc.localDescription);
                    statusEl.textContent = '🔗 Отправлен ответ, ждём видео...';
                    // Слушаем ICE от вещателя
                    unsubscribe = listen(`rooms/${room}/ice`, (c)=>{
                        if(c.candidate) pc.addIceCandidate(new RTCIceCandidate(c.candidate));
                    });
                }
            } catch(e) {
                statusEl.textContent = 'Ошибка сигнализации: ' + e.message;
                console.error(e);
            }
        });

        window.addEventListener('load', ()=>{
            if(!navigator.mediaDevices?.getUserMedia) { statusEl.textContent='❌ Нет поддержки камеры'; return; }
            startCamera();
        });
        window.addEventListener('beforeunload', ()=>{
            if(stream) stream.getTracks().forEach(t=>t.stop());
            if(pc) pc.close();
            if(unsubscribe) unsubscribe();
        });
    </script>
</body>
</html>
