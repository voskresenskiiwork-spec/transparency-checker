<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Прозрачность жидкости</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            width: 100%;
            max-width: 550px;
            background: white;
            border-radius: 20px;
            padding: 20px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            position: relative;
        }
        #datetime {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 0.85rem;
            color: #666;
            background: rgba(0,0,0,0.05);
            padding: 4px 10px;
            border-radius: 8px;
            z-index: 10;
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.3rem; color: #2c3e50; }
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin: 15px 0;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .region-selector {
            position: absolute;
            border: 2px dashed #f1c40f;
            background: rgba(241, 196, 15, 0.15);
            pointer-events: none;
            display: none;
            z-index: 5;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 10px 0;
        }
        button {
            flex: 1 1 auto;
            min-width: 80px;
            padding: 10px 8px;
            border: none;
            border-radius: 12px;
            background: #3498db;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            touch-action: manipulation;
        }
        button:active { transform: scale(0.96); }
        button:disabled { background: #bdc3c7; transform: none; }
        .calibrate-btn { background: #27ae60; }
        .record-btn { background: #f39c12; }
        .broadcast-btn { background: #8e44ad; }
        .threshold-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .threshold-row input {
            width: 70px;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1rem;
            text-align: center;
        }
        .warning-text {
            color: #e74c3c;
            font-weight: bold;
            font-size: 1.2rem;
            margin: 5px 0;
            min-height: 1.5em;
        }
        .result-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 15px;
            margin-top: 10px;
        }
        .meter {
            width: 100%;
            height: 24px;
            background: linear-gradient(to right, #fff, #2c3e50);
            border-radius: 12px;
            margin: 12px 0;
            position: relative;
            overflow: hidden;
            border: 1px solid #ddd;
        }
        .indicator {
            position: absolute;
            top: -3px;
            width: 5px;
            height: 30px;
            background: #e74c3c;
            border-radius: 3px;
            transition: left 0.15s;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            font-size: 1rem;
            margin: 5px 0;
        }
        .value { font-weight: 700; font-size: 1.3rem; color: #2c3e50; }
        #statusText { font-size: 0.9rem; color: #7f8c8d; margin-top: 5px; min-height: 1.2em; }
        .history {
            margin-top: 15px;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
        .history h3 { margin-bottom: 5px; color: #2c3e50; }
        .history-item {
            font-size: 0.8rem;
            padding: 4px 6px;
            background: #fff;
            border-radius: 6px;
            margin-bottom: 3px;
            display: flex;
            justify-content: space-between;
        }
        .clear-history {
            font-size: 0.75rem;
            color: #e74c3c;
            cursor: pointer;
            text-decoration: underline;
            background: none;
            border: none;
            padding: 0;
            margin-top: 4px;
        }
        .trend-canvas {
            width: 100%;
            height: 150px;
            background: #fff;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-top: 10px;
        }
        .room-block {
            margin: 10px 0;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .room-block input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            width: 60%;
            font-size: 1rem;
            text-align: center;
        }
        .status-text {
            font-size: 0.85rem;
            color: #555;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="datetime"></div>
        <h1>💧 Прозрачность жидкости</h1>

        <div class="video-wrapper" id="videoWrapper">
            <video id="video" autoplay playsinline muted></video>
            <div id="regionSelector" class="region-selector"></div>
        </div>

        <div class="room-block">
            <input type="text" id="roomInput" placeholder="Имя комнаты">
            <button id="createRoomBtn" class="broadcast-btn" disabled>📡 Создать трансляцию</button>
            <button id="joinRoomBtn" disabled>🔗 Подключиться</button>
        </div>

        <div class="status-text" id="connectionStatus"></div>

        <div class="controls">
            <button id="areaBtn" disabled>🎯 Область</button>
            <button id="resetBtn" disabled>🔄 Сброс</button>
            <button id="calibrateBtn" class="calibrate-btn" disabled>📏 Калибровать</button>
            <button id="recordBtn" class="record-btn" disabled>📝 Записать</button>
        </div>

        <div class="threshold-row">
            <label for="threshold">Порог (0-100%):</label>
            <input type="number" id="threshold" value="70" min="0" max="100" step="1">
        </div>
        <div id="warningMessage" class="warning-text"></div>

        <div class="result-card">
            <div class="stats">
                <span>Прозрачность <span class="value" id="transparencyValue">0%</span></span>
                <span>Яркость <span class="value" id="brightnessValue">0</span></span>
            </div>
            <div class="meter">
                <div class="indicator" id="indicator" style="left: 0%;"></div>
            </div>
            <div id="statusText">Загрузка камеры...</div>
        </div>

        <canvas id="trendCanvas" class="trend-canvas" width="500" height="150"></canvas>

        <div class="history" id="historyContainer">
            <h3>📋 История измерений</h3>
            <div id="historyList"></div>
            <button class="clear-history" id="clearHistoryBtn">Очистить историю</button>
        </div>
    </div>

    <script>
        // DOM элементы
        const video = document.getElementById('video');
        const areaBtn = document.getElementById('areaBtn');
        const resetBtn = document.getElementById('resetBtn');
        const calibrateBtn = document.getElementById('calibrateBtn');
        const recordBtn = document.getElementById('recordBtn');
        const createRoomBtn = document.getElementById('createRoomBtn');
        const joinRoomBtn = document.getElementById('joinRoomBtn');
        const roomInput = document.getElementById('roomInput');
        const transparencyEl = document.getElementById('transparencyValue');
        const brightnessEl = document.getElementById('brightnessValue');
        const indicatorEl = document.getElementById('indicator');
        const statusEl = document.getElementById('statusText');
        const connectionStatus = document.getElementById('connectionStatus');
        const regionSelector = document.getElementById('regionSelector');
        const thresholdInput = document.getElementById('threshold');
        const warningMsg = document.getElementById('warningMessage');
        const datetimeEl = document.getElementById('datetime');
        const historyList = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const trendCanvas = document.getElementById('trendCanvas');
        const ctxTrend = trendCanvas.getContext('2d');

        let stream = null;
        let analysisRegion = null;
        let isSelecting = false;
        let animationId = null;
        let calibrationBrightness = null;
        let currentTransparency = 0;
        let currentBrightness = 0;
        let trendData = [];

        // WebRTC вручную (без сервера)
        let pc = null;
        let dataChannel = null;
        let isBroadcaster = false;
        let isViewer = false;

        // Дата/время
        function updateDateTime() {
            const now = new Date();
            datetimeEl.textContent = now.toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' });
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        // График
        function drawTrend() {
            ctxTrend.clearRect(0, 0, trendCanvas.width, trendCanvas.height);
            if (trendData.length < 2) return;
            const w = trendCanvas.width, h = trendCanvas.height;
            const points = trendData.slice(-30);
            const xStep = w / (points.length - 1);
            ctxTrend.beginPath();
            ctxTrend.strokeStyle = '#3498db';
            ctxTrend.lineWidth = 2;
            for (let i = 0; i < points.length; i++) {
                const x = i * xStep;
                const y = h - (points[i].transparency / 100) * h;
                if (i === 0) ctxTrend.moveTo(x, y);
                else ctxTrend.lineTo(x, y);
            }
            ctxTrend.stroke();
            const threshold = parseFloat(thresholdInput.value) || 70;
            const yThreshold = h - (threshold / 100) * h;
            ctxTrend.beginPath();
            ctxTrend.strokeStyle = '#e74c3c';
            ctxTrend.setLineDash([5, 5]);
            ctxTrend.moveTo(0, yThreshold);
            ctxTrend.lineTo(w, yThreshold);
            ctxTrend.stroke();
            ctxTrend.setLineDash([]);
        }

        function addTrendPoint(transparency) {
            trendData.push({ time: Date.now(), transparency });
            if (trendData.length > 60) trendData.shift();
            drawTrend();
        }

        // Камера
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: 'environment' }, width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
            } catch (e) {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                } catch (err) {
                    statusEl.textContent = '❌ Нет доступа к камере. Разрешите и перезагрузите.';
                    return;
                }
            }
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                statusEl.textContent = '✅ Камера готова. Вы можете создать трансляцию или подключиться.';
                areaBtn.disabled = false;
                calibrateBtn.disabled = false;
                recordBtn.disabled = false;
                createRoomBtn.disabled = false;
                joinRoomBtn.disabled = false;
                startAnalysis();
            };
        }

        // Выбор области
        function getCoords(e) {
            const rect = video.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top, rectWidth: rect.width, rectHeight: rect.height };
        }
        let startX, startY;
        function onPointerDown(e) {
            if (!isSelecting) return;
            e.preventDefault();
            const { x, y } = getCoords(e);
            startX = x; startY = y;
            regionSelector.style.display = 'block';
            regionSelector.style.left = x + 'px';
            regionSelector.style.top = y + 'px';
            regionSelector.style.width = '0px';
            regionSelector.style.height = '0px';
        }
        function onPointerMove(e) {
            if (!isSelecting || startX === undefined) return;
            e.preventDefault();
            const { x, y } = getCoords(e);
            regionSelector.style.left = Math.min(startX, x) + 'px';
            regionSelector.style.top = Math.min(startY, y) + 'px';
            regionSelector.style.width = Math.abs(x - startX) + 'px';
            regionSelector.style.height = Math.abs(y - startY) + 'px';
        }
        function onPointerUp(e) {
            if (!isSelecting || startX === undefined) return;
            e.preventDefault();
            const { x, y, rectWidth, rectHeight } = getCoords(e);
            const scaleX = video.videoWidth / rectWidth;
            const scaleY = video.videoHeight / rectHeight;
            analysisRegion = {
                x: Math.min(startX, x) * scaleX,
                y: Math.min(startY, y) * scaleY,
                width: Math.abs(x - startX) * scaleX,
                height: Math.abs(y - startY) * scaleY
            };
            isSelecting = false;
            areaBtn.textContent = '🎯 Область';
            areaBtn.style.background = '#3498db';
            resetBtn.disabled = false;
            removeSelectionListeners();
        }
        function addSelectionListeners() {
            video.addEventListener('mousedown', onPointerDown);
            video.addEventListener('mousemove', onPointerMove);
            video.addEventListener('mouseup', onPointerUp);
            video.addEventListener('touchstart', onPointerDown, { passive: false });
            video.addEventListener('touchmove', onPointerMove, { passive: false });
            video.addEventListener('touchend', onPointerUp);
        }
        function removeSelectionListeners() {
            video.removeEventListener('mousedown', onPointerDown);
            video.removeEventListener('mousemove', onPointerMove);
            video.removeEventListener('mouseup', onPointerUp);
            video.removeEventListener('touchstart', onPointerDown);
            video.removeEventListener('touchmove', onPointerMove);
            video.removeEventListener('touchend', onPointerUp);
        }

        areaBtn.addEventListener('click', () => {
            if (isSelecting) {
                isSelecting = false;
                areaBtn.textContent = '🎯 Область';
                regionSelector.style.display = 'none';
                removeSelectionListeners();
                return;
            }
            if (!stream) return;
            isSelecting = true;
            areaBtn.textContent = '✋ Отменить';
            areaBtn.style.background = '#e67e22';
            addSelectionListeners();
        });

        resetBtn.addEventListener('click', () => {
            analysisRegion = null;
            regionSelector.style.display = 'none';
            resetBtn.disabled = true;
            statusEl.textContent = '🔄 Область сброшена.';
        });

        calibrateBtn.addEventListener('click', () => {
            if (!stream) return;
            calibrationBrightness = currentBrightness;
            statusEl.textContent = `📏 Калибровка: ${calibrationBrightness.toFixed(1)} = 100%`;
        });

        function addHistoryRecord() {
            const now = new Date();
            const threshold = parseFloat(thresholdInput.value) || 70;
            const warning = currentTransparency < threshold ? '⚠️ WARNING' : '✅ Норма';
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>${now.toLocaleTimeString('ru-RU')}</span> <span>${currentTransparency.toFixed(1)}%</span> <span>${warning}</span>`;
            historyList.prepend(div);
        }
        recordBtn.addEventListener('click', () => {
            if (!stream) return;
            addHistoryRecord();
        });
        clearHistoryBtn.addEventListener('click', () => historyList.innerHTML = '');

        // Анализ кадра
        function analyzeFrame() {
            if (!stream || video.readyState < 2) {
                animationId = requestAnimationFrame(analyzeFrame);
                return;
            }
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);

            let imageData;
            if (analysisRegion) {
                const rx = Math.max(0, Math.min(analysisRegion.x, canvas.width - 1));
                const ry = Math.max(0, Math.min(analysisRegion.y, canvas.height - 1));
                const rw = Math.max(1, Math.min(analysisRegion.width, canvas.width - rx));
                const rh = Math.max(1, Math.min(analysisRegion.height, canvas.height - ry));
                imageData = ctx.getImageData(rx, ry, rw, rh);
            } else {
                imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            }

            const data = imageData.data;
            let totalBrightness = 0;
            for (let i = 0; i < data.length; i += 4) {
                totalBrightness += 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
            }
            currentBrightness = totalBrightness / (data.length / 4);
            currentTransparency = calibrationBrightness ? Math.min(100, (currentBrightness / calibrationBrightness) * 100) : Math.min(100, (currentBrightness / 255) * 100);
            currentTransparency = Math.max(0, currentTransparency);

            transparencyEl.textContent = currentTransparency.toFixed(1) + '%';
            brightnessEl.textContent = currentBrightness.toFixed(1);
            indicatorEl.style.left = currentTransparency + '%';

            const threshold = parseFloat(thresholdInput.value) || 70;
            warningMsg.textContent = currentTransparency < threshold ? '⚠️ WARNING: Прозрачность ниже порога!' : '';

            addTrendPoint(currentTransparency);

            if (dataChannel && dataChannel.readyState === 'open' && isBroadcaster) {
                dataChannel.send(JSON.stringify({ transparency: currentTransparency, brightness: currentBrightness }));
            }

            animationId = requestAnimationFrame(analyzeFrame);
        }

        function startAnalysis() {
            if (animationId) cancelAnimationFrame(animationId);
            analyzeFrame();
        }

        // ====== СОЗДАНИЕ ТРАНСЛЯЦИИ (ВЕЩАТЕЛЬ) ======
        createRoomBtn.addEventListener('click', () => {
            const room = roomInput.value.trim();
            if (!room) return alert('Введите имя комнаты');
            if (!stream) return alert('Камера ещё не готова');

            if (pc) { pc.close(); pc = null; }

            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            stream.getTracks().forEach(track => pc.addTrack(track, stream));
            isBroadcaster = true;
            isViewer = false;

            dataChannel = pc.createDataChannel('transparency');
            dataChannel.onopen = () => console.log('DataChannel opened (broadcaster)');
            dataChannel.onclose = () => console.log('DataChannel closed');

            pc.ontrack = () => {};
            pc.ondatachannel = () => {};

            pc.onicecandidate = (event) => {
                if (!event.candidate) {
                    // Сбор ICE завершён, показываем полный SDP
                    const offer = pc.localDescription;
                    const roomState = JSON.parse(localStorage.getItem('room_' + room) || '{}');
                    roomState.offer = offer;
                    roomState.time = Date.now();
                    localStorage.setItem('room_' + room, JSON.stringify(roomState));
                    connectionStatus.textContent = '📡 Трансляция создана! Ожидание подключения... (SDP сохранён локально)';
                    statusEl.textContent = 'Трансляция активна. На втором устройстве введите ту же комнату и нажмите «Подключиться».';
                }
            };

            pc.createOffer().then(offer => pc.setLocalDescription(offer));
        });

        // ====== ПОДКЛЮЧЕНИЕ К ТРАНСЛЯЦИИ (НАБЛЮДАТЕЛЬ) ======
        joinRoomBtn.addEventListener('click', async () => {
            const room = roomInput.value.trim();
            if (!room) return alert('Введите имя комнаты');

            // Загружаем SDP из localStorage
            const roomState = JSON.parse(localStorage.getItem('room_' + room) || '{}');
            if (!roomState.offer) {
                return alert('Трансляция с таким именем не найдена. Сначала создайте её на устройстве-вещателе.');
            }

            // Проверяем, не устарело ли предложение (2 минуты)
            if (Date.now() - roomState.time > 120000) {
                return alert('Трансляция устарела. Обновите создание комнаты на вещателе.');
            }

            if (pc) { pc.close(); pc = null; }

            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            isBroadcaster = false;
            isViewer = true;

            pc.ontrack = (event) => {
                video.srcObject = event.streams[0];
                statusEl.textContent = '📡 Видео получено!';
                areaBtn.disabled = true;
                calibrateBtn.disabled = true;
            };

            pc.ondatachannel = (event) => {
                const channel = event.channel;
                channel.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    currentTransparency = data.transparency;
                    currentBrightness = data.brightness;
                    transparencyEl.textContent = currentTransparency.toFixed(1) + '%';
                    brightnessEl.textContent = currentBrightness.toFixed(1);
                    indicatorEl.style.left = currentTransparency + '%';
                    addTrendPoint(currentTransparency);
                    const threshold = parseFloat(thresholdInput.value) || 70;
                    warningMsg.textContent = currentTransparency < threshold ? '⚠️ WARNING: Прозрачность ниже порога!' : '';
                };
            };

            pc.onicecandidate = (event) => {
                if (!event.candidate) {
                    const answer = pc.localDescription;
                    const updatedState = roomState;
                    updatedState.answer = answer;
                    updatedState.time = Date.now();
                    localStorage.setItem('room_' + room, JSON.stringify(updatedState));
                    connectionStatus.textContent = '📡 Ответ сформирован. Завершаем подключение...';
                }
            };

            try {
                await pc.setRemoteDescription(new RTCSessionDescription(roomState.offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
            } catch (e) {
                alert('Ошибка подключения: ' + e.message);
                return;
            }

            // Через секунду проверяем, появился ли ответ от вещателя
            setTimeout(async () => {
                const updatedState = JSON.parse(localStorage.getItem('room_' + room) || '{}');
                if (!updatedState.answer) {
                    connectionStatus.textContent = '⏳ Ожидание ответа...';
                    return;
                }
                // Вещатель должен прочитать answer из localStorage
                // На вещателе запускаем обработчик
                if (isBroadcaster) {
                    try {
                        await pc.setRemoteDescription(new RTCSessionDescription(updatedState.answer));
                        statusEl.textContent = '✅ Соединение установлено! Идёт трансляция.';
                        connectionStatus.textContent = '🔗 Наблюдатель подключён';
                    } catch (e) {
                        console.error('Ошибка принятия ответа:', e);
                    }
                }
            }, 2000);

            statusEl.textContent = 'Подключаюсь к трансляции...';
            connectionStatus.textContent = '⏳ Устанавливаю соединение...';
        });

        // Автоподхват ответа вещателем
        setInterval(() => {
            const room = roomInput.value.trim();
            if (!room || !isBroadcaster || !pc) return;
            const roomState = JSON.parse(localStorage.getItem('room_' + room) || '{}');
            if (roomState.answer && pc.signalingState !== 'stable') {
                pc.setRemoteDescription(new RTCSessionDescription(roomState.answer))
                    .then(() => {
                        statusEl.textContent = '✅ Соединение установлено! Идёт трансляция.';
                        connectionStatus.textContent = '🔗 Наблюдатель подключён';
                        // Очищаем, чтобы не повторять
                        const state = roomState;
                        delete state.answer;
                        localStorage.setItem('room_' + room, JSON.stringify(state));
                    })
                    .catch((e) => console.error('Auto-answer error:', e));
            }
        }, 3000);

        // Запуск
        window.addEventListener('load', () => {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                statusEl.textContent = '❌ Браузер не поддерживает камеру.';
                return;
            }
            startCamera();
        });

        window.addEventListener('beforeunload', () => {
            if (stream) stream.getTracks().forEach(track => track.stop());
            if (pc) pc.close();
        });
    </script>
</body>
</html>
