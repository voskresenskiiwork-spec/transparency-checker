<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Прозрачность жидкости</title>
    <style>
        :root {
            --bg: #1a1d23;
            --card: #21252b;
            --surface: #282c34;
            --text: #e1e4e8;
            --text-secondary: #959da5;
            --blue: #58a6ff;
            --green: #3fb950;
            --orange: #f0883e;
            --red: #f85149;
            --purple: #bc8cff;
            --yellow: #d2991d;
            --border: #30363d;
            --shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            width: 100%;
            max-width: 560px;
            background: var(--card);
            border-radius: 24px;
            padding: 20px 16px;
            box-shadow: var(--shadow);
            text-align: center;
            border: 1px solid var(--border);
        }
        .header { margin-bottom: 12px; }
        h1 { font-size: 1.4rem; color: var(--text); font-weight: 700; letter-spacing: -0.3px; margin-bottom: 2px; }
        #datetime { font-size: 0.8rem; color: var(--text-secondary); font-weight: 500; }
        
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin: 12px 0;
            border: 2px solid var(--border);
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
        }
        video { width: 100%; height: 100%; object-fit: cover; display: block; }
        .region-selector {
            position: absolute;
            border: 2px dashed var(--yellow);
            background: rgba(210, 153, 29, 0.2);
            pointer-events: none;
            display: none;
            z-index: 5;
            border-radius: 4px;
        }
        
        .controls {
            display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 8px 0;
        }
        button {
            flex: 1 1 auto; min-width: 60px; padding: 10px 5px; border: 1px solid var(--border); 
            border-radius: 12px; background: var(--surface); color: var(--text); font-size: 0.75rem; 
            font-weight: 600; cursor: pointer; transition: all 0.2s; touch-action: manipulation;
        }
        button:active { transform: scale(0.96); opacity: 0.9; }
        button:disabled { background: #1c1f26; color: #555; cursor: not-allowed; transform: none; border-color: #222; }
        
        .btn-green { background: #1a3a2a; border-color: var(--green); color: var(--green); }
        .btn-gray { background: #2a2d35; border-color: #555; color: #bbb; }
        .btn-red { background: #3a1a1a; border-color: var(--red); color: var(--red); }
        .btn-blue { background: #1a2a3a; border-color: var(--blue); color: var(--blue); }
        .btn-purple { background: #2a1a3a; border-color: var(--purple); color: var(--purple); }
        .btn-yellow { background: #3a3a1a; border-color: var(--yellow); color: var(--yellow); }
        .btn-cyan { background: #1a3a3a; border-color: #56d4dd; color: #56d4dd; }
        .btn-orange { background: #3a2a1a; border-color: var(--orange); color: var(--orange); }
        
        .sound-indicator {
            display: inline-flex; align-items: center; gap: 6px; font-size: 0.7rem;
            color: var(--text-secondary); margin: 2px 0 6px;
        }
        .sound-dot {
            width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite;
        }
        .sound-dot.muted { background: var(--red); animation: none; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .calibration-inputs {
            display: flex; gap: 8px; justify-content: center; align-items: center;
            margin: 8px 0; flex-wrap: wrap; font-size: 0.75rem; color: var(--text-secondary);
        }
        .calibration-inputs input {
            width: 70px; padding: 6px 8px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text); font-size: 0.8rem; text-align: center; font-weight: 500;
        }
        
        .threshold-row {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin: 8px 0; flex-wrap: wrap; color: var(--text-secondary); font-size: 0.8rem;
        }
        .threshold-row input {
            width: 55px; padding: 6px 8px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text); font-size: 0.85rem; text-align: center; font-weight: 600;
        }
        
        .warning-text {
            color: var(--red); font-weight: 600; font-size: 1rem; margin: 6px 0; min-height: 1.3em;
        }
        .warning-text.active { animation: warningPulse 1.5s ease-in-out infinite; }
        @keyframes warningPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        
        .result-card {
            background: var(--surface); border-radius: 16px; padding: 14px; margin-top: 8px;
            border: 1px solid var(--border);
        }
        .meter {
            width: 100%; height: 24px; background: linear-gradient(to right, #1a1a1a, #2a2a2a, #3a3a3a, #e0e0e0);
            border-radius: 12px; margin: 10px 0; position: relative; overflow: hidden; border: 1px solid var(--border);
        }
        .meter-fill {
            position: absolute; top: 0; left: 0; height: 100%;
            background: linear-gradient(90deg, #3fb95044, #3fb95088);
            border-radius: 12px 0 0 12px; transition: width 0.3s ease;
        }
        .indicator {
            position: absolute; top: -3px; width: 4px; height: 30px; background: var(--text);
            border-radius: 2px; transition: left 0.2s ease; box-shadow: 0 0 8px rgba(255,255,255,0.3);
        }
        .stats { display: flex; justify-content: space-around; font-size: 0.9rem; margin: 6px 0; color: var(--text-secondary); }
        .value { font-weight: 700; font-size: 1.4rem; color: var(--text); }
        #statusText { font-size: 0.8rem; color: var(--text-secondary); margin-top: 6px; min-height: 1.1em; }
        
        .auto-cal-progress {
            margin: 8px 0; font-size: 0.75rem; color: var(--text-secondary);
        }
        .progress-bar {
            width: 100%; height: 6px; background: var(--surface); border-radius: 3px;
            margin: 4px 0; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: var(--orange); border-radius: 3px;
            transition: width 0.5s ease;
        }
        
        .statistics {
            background: var(--surface); border-radius: 12px; padding: 10px; margin-top: 8px;
            border: 1px solid var(--border); font-size: 0.75rem; color: var(--text-secondary);
            display: flex; flex-wrap: wrap; justify-content: space-around; gap: 8px;
        }
        .statistics .stat-item { text-align: center; }
        .statistics .stat-value { font-weight: 700; color: var(--text); font-size: 1rem; }
        
        .history {
            margin-top: 14px; text-align: left; max-height: 200px; overflow-y: auto;
            border-top: 1px solid var(--border); padding-top: 10px;
        }
        .history h3 { margin-bottom: 8px; color: var(--text); font-size: 0.9rem; }
        .history-item {
            font-size: 0.72rem; padding: 6px 8px; background: var(--surface); border-radius: 8px;
            margin-bottom: 4px; color: var(--text-secondary); border: 1px solid transparent;
            line-height: 1.4;
        }
        .history-item .time { color: var(--text-secondary); font-size: 0.7rem; }
        .history-item .transparency { color: var(--green); font-weight: 700; font-size: 0.9rem; }
        .history-item .limits { color: var(--blue); font-size: 0.68rem; }
        .history-item .warning-badge { font-weight: 700; }
        .clear-history {
            font-size: 0.7rem; color: var(--red); cursor: pointer; background: none; border: none;
            padding: 4px 0; margin-top: 4px; opacity: 0.8;
        }
        .trend-canvas {
            width: 100%; height: 130px; background: var(--surface); border-radius: 12px;
            border: 1px solid var(--border); margin-top: 10px;
        }
        
        .timer-row {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin: 8px 0; color: var(--text-secondary); font-size: 0.75rem;
        }
        .timer-row input { width: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💧 Прозрачность жидкости</h1>
            <div id="datetime"></div>
        </div>
        
        <div class="video-wrapper" id="videoWrapper">
            <video id="video" autoplay playsinline muted></video>
            <div id="regionSelector" class="region-selector"></div>
        </div>
        
        <!-- Основные кнопки -->
        <div class="controls">
            <button id="areaBtn" disabled>🎯 Область</button>
            <button id="resetBtn" class="btn-red" disabled>🔄 Сброс</button>
            <button id="calibrateLowBtn" class="btn-green" disabled>📏 Нижний предел</button>
            <button id="calibrateHighBtn" class="btn-gray" disabled>⬛ Верхний предел</button>
            <button id="recordBtn" class="btn-blue" disabled>📝 Записать</button>
        </div>
        
        <!-- Дополнительные функции -->
        <div class="controls">
            <button id="soundToggleBtn" class="btn-purple" disabled>🔊 Звук</button>
            <button id="snapshotBtn" class="btn-cyan" disabled>📸 Снимок</button>
            <button id="exportBtn" class="btn-yellow" disabled>📊 Экспорт</button>
            <button id="autoRecordBtn" class="btn-blue" disabled>⏱️ Авто</button>
            <button id="autoCalBtn" class="btn-orange" disabled>🔬 Авто.калибр</button>
        </div>
        
        <!-- Прогресс авто-калибровки -->
        <div class="auto-cal-progress" id="autoCalProgress" style="display:none;">
            <span id="autoCalPhase">⚡ Авто-калибровка активна</span>
            <span id="autoCalTimer" style="margin-left:10px;">00:00</span>
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        </div>
        
        <div class="sound-indicator">
            <div class="sound-dot" id="soundDot"></div>
            <span id="soundStatus">Звук включён</span>
        </div>
        
        <!-- Таймер авто-записи -->
        <div class="timer-row" id="timerRow" style="display:none;">
            <label>Интервал (сек):</label>
            <input type="number" id="timerInterval" value="5" min="1" max="60" step="1">
            <span id="timerCountdown">—</span>
            <button id="stopAutoBtn" class="btn-red" style="flex:0 0 auto; min-width:40px;">✕</button>
        </div>
        
        <!-- Ручной ввод пределов -->
        <div class="calibration-inputs">
            <label>Нижний (100%):</label>
            <input type="number" id="lowCalInput" placeholder="Авто" step="0.1">
            <label>Верхний (0%):</label>
            <input type="number" id="highCalInput" placeholder="Авто" step="0.1">
            <button id="applyCalBtn" class="btn-blue" style="flex:0 0 auto; min-width:45px;">✓</button>
        </div>
        
        <!-- Порог WARNING -->
        <div class="threshold-row">
            <label for="threshold">⚠️ Порог:</label>
            <input type="number" id="threshold" value="30" min="0" max="100" step="1">
            <span>%</span>
        </div>
        
        <!-- Предупреждение -->
        <div id="warningMessage" class="warning-text"></div>
        
        <!-- Результаты -->
        <div class="result-card">
            <div class="stats">
                <span>Прозрачность <span class="value" id="transparencyValue">0%</span></span>
                <span>Яркость <span class="value" id="brightnessValue">0</span></span>
            </div>
            <div class="meter">
                <div class="meter-fill" id="meterFill" style="width: 0%;"></div>
                <div class="indicator" id="indicator" style="left: 0%;"></div>
            </div>
            <div id="statusText">Загрузка камеры...</div>
        </div>
        
        <!-- Статистика -->
        <div class="statistics" id="statistics">
            <div class="stat-item">Среднее: <span class="stat-value" id="statAvg">—</span></div>
            <div class="stat-item">Мин: <span class="stat-value" id="statMin">—</span></div>
            <div class="stat-item">Макс: <span class="stat-value" id="statMax">—</span></div>
            <div class="stat-item">Измерений: <span class="stat-value" id="statCount">0</span></div>
        </div>
        
        <!-- График -->
        <canvas id="trendCanvas" class="trend-canvas" width="500" height="130"></canvas>
        
        <!-- История -->
        <div class="history" id="historyContainer">
            <h3>📋 История измерений</h3>
            <div id="historyList"></div>
            <button class="clear-history" id="clearHistoryBtn">Очистить историю</button>
        </div>
    </div>

    <script>
        // ===== DOM элементы =====
        const video = document.getElementById('video');
        const areaBtn = document.getElementById('areaBtn');
        const resetBtn = document.getElementById('resetBtn');
        const calibrateLowBtn = document.getElementById('calibrateLowBtn');
        const calibrateHighBtn = document.getElementById('calibrateHighBtn');
        const recordBtn = document.getElementById('recordBtn');
        const soundToggleBtn = document.getElementById('soundToggleBtn');
        const snapshotBtn = document.getElementById('snapshotBtn');
        const exportBtn = document.getElementById('exportBtn');
        const autoRecordBtn = document.getElementById('autoRecordBtn');
        const autoCalBtn = document.getElementById('autoCalBtn');
        const stopAutoBtn = document.getElementById('stopAutoBtn');
        const transparencyEl = document.getElementById('transparencyValue');
        const brightnessEl = document.getElementById('brightnessValue');
        const indicatorEl = document.getElementById('indicator');
        const meterFill = document.getElementById('meterFill');
        const statusEl = document.getElementById('statusText');
        const regionSelector = document.getElementById('regionSelector');
        const thresholdInput = document.getElementById('threshold');
        const warningMsg = document.getElementById('warningMessage');
        const datetimeEl = document.getElementById('datetime');
        const historyList = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const trendCanvas = document.getElementById('trendCanvas');
        const ctxTrend = trendCanvas.getContext('2d');
        const lowCalInput = document.getElementById('lowCalInput');
        const highCalInput = document.getElementById('highCalInput');
        const applyCalBtn = document.getElementById('applyCalBtn');
        const soundDot = document.getElementById('soundDot');
        const soundStatusEl = document.getElementById('soundStatus');
        const timerRow = document.getElementById('timerRow');
        const timerInterval = document.getElementById('timerInterval');
        const timerCountdown = document.getElementById('timerCountdown');
        const statAvg = document.getElementById('statAvg');
        const statMin = document.getElementById('statMin');
        const statMax = document.getElementById('statMax');
        const statCount = document.getElementById('statCount');
        const autoCalProgress = document.getElementById('autoCalProgress');
        const autoCalPhase = document.getElementById('autoCalPhase');
        const autoCalTimer = document.getElementById('autoCalTimer');
        const progressFill = document.getElementById('progressFill');

        // ===== Состояние =====
        let stream = null, analysisRegion = null, isSelecting = false, animationId = null;
        let calibrationLow = null, calibrationHigh = null;
        let currentTransparency = 0, currentBrightness = 0, trendData = [];
        let audioCtx = null, soundEnabled = true, lastBeepTime = 0, beepInterval = 2000;
        let autoRecordTimer = null, autoRecordSeconds = 0;
        let historyRecords = [];

        // ===== Авто-калибровка (новая логика) =====
        // Нижний предел обновляется ПОСТОЯННО (каждые 5 секунд), если яркость стала ВЫШЕ (светлее)
        // Верхний предел обновляется ПОСТОЯННО (каждые 5 секунд), если яркость стала НИЖЕ (темнее)
        // Общая длительность: 20 минут, после чего авто-калибровка останавливается
        let autoCalibration = {
            active: false,
            startTime: 0,
            totalDuration: 20 * 60 * 1000, // 20 минут
            timer: null,
            updateInterval: null,
            elapsedSeconds: 0,
            lastLowCheck: 0,  // время последней проверки нижнего предела
            lastHighCheck: 0  // время последней проверки верхнего предела
        };

        function startAutoCalibration() {
            if (autoCalibration.active) {
                stopAutoCalibration();
                return;
            }
            if (!stream) return;
            
            autoCalibration.active = true;
            autoCalibration.startTime = Date.now();
            autoCalibration.elapsedSeconds = 0;
            autoCalibration.lastLowCheck = 0;
            autoCalibration.lastHighCheck = 0;
            
            autoCalBtn.textContent = '⏹️ Стоп калибр';
            autoCalProgress.style.display = 'block';
            autoCalPhase.textContent = '⚡ Авто-калибровка активна';
            progressFill.style.width = '0%';
            
            // Если пределы не заданы, берём текущие значения как начальные
            if (calibrationLow === null) {
                calibrationLow = currentBrightness;
                updateCalInputs();
                logAutoCalibration('📏 Начальный нижний предел: ' + calibrationLow.toFixed(1));
            }
            if (calibrationHigh === null) {
                calibrationHigh = currentBrightness;
                updateCalInputs();
                logAutoCalibration('⬛ Начальный верхний предел: ' + calibrationHigh.toFixed(1));
            }
            
            autoCalibration.updateInterval = setInterval(() => {
                const elapsed = Date.now() - autoCalibration.startTime;
                autoCalibration.elapsedSeconds = Math.floor(elapsed / 1000);
                const minutes = Math.floor(autoCalibration.elapsedSeconds / 60);
                const seconds = autoCalibration.elapsedSeconds % 60;
                autoCalTimer.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                
                const progress = Math.min(100, (elapsed / autoCalibration.totalDuration) * 100);
                progressFill.style.width = progress + '%';
                
                // Каждые 5 секунд проверяем оба предела
                if (autoCalibration.elapsedSeconds >= 5 && autoCalibration.elapsedSeconds % 5 === 0) {
                    // Проверка нижнего предела: если яркость стала ВЫШЕ (светлее) — обновляем
                    if (currentBrightness > calibrationLow) {
                        calibrationLow = currentBrightness;
                        updateCalInputs();
                        logAutoCalibration('📏 Новый нижний предел (ярче): ' + calibrationLow.toFixed(1));
                    }
                    
                    // Проверка верхнего предела: если яркость стала НИЖЕ (темнее) — обновляем
                    if (calibrationLow !== null && currentBrightness < calibrationHigh && currentBrightness < calibrationLow) {
                        calibrationHigh = currentBrightness;
                        updateCalInputs();
                        logAutoCalibration('⬛ Новый верхний предел (темнее): ' + calibrationHigh.toFixed(1));
                    }
                }
                
                // Проверка на завершение по времени
                if (elapsed >= autoCalibration.totalDuration) {
                    stopAutoCalibration();
                    statusEl.textContent = '🔬 Авто-калибровка завершена (20 мин)';
                }
            }, 1000);
            
            statusEl.textContent = '🔬 Авто-калибровка запущена (20 мин)';
        }

        function stopAutoCalibration() {
            autoCalibration.active = false;
            if (autoCalibration.updateInterval) clearInterval(autoCalibration.updateInterval);
            autoCalibration.updateInterval = null;
            autoCalBtn.textContent = '🔬 Авто.калибр';
            autoCalProgress.style.display = 'none';
            logAutoCalibration('⏹️ Авто-калибровка остановлена');
        }

        function logAutoCalibration(message) {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ru-RU');
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span class="time">${timeStr}</span> <span style="color:var(--orange)">🔬 ${message}</span>`;
            historyList.prepend(div);
        }

        // ===== Аудио =====
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }
        }

        function playCalmBeep() {
            if (!soundEnabled || !audioCtx) return;
            const now = Date.now();
            if (now - lastBeepTime < beepInterval) return;
            lastBeepTime = now;
            const playTone = (freq, startTime, duration, volume) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, startTime);
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(volume, startTime + 0.05);
                gain.gain.linearRampToValueAtTime(0, startTime + duration);
                osc.start(startTime); osc.stop(startTime + duration);
            };
            const t = audioCtx.currentTime;
            playTone(440, t, 0.3, 0.08);
            playTone(554, t + 0.2, 0.25, 0.06);
            beepInterval = Math.max(800, 3000 - (currentTransparency * 30));
        }

        function updateDateTime() {
            datetimeEl.textContent = new Date().toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' });
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        function updateCalInputs() {
            lowCalInput.value = calibrationLow !== null ? calibrationLow.toFixed(1) : '';
            highCalInput.value = calibrationHigh !== null ? calibrationHigh.toFixed(1) : '';
        }

        function updateStatistics() {
            if (historyRecords.length === 0) {
                statAvg.textContent = '—'; statMin.textContent = '—'; statMax.textContent = '—'; statCount.textContent = '0';
                return;
            }
            const values = historyRecords.map(r => r.transparency);
            statAvg.textContent = (values.reduce((a,b)=>a+b,0)/values.length).toFixed(1)+'%';
            statMin.textContent = Math.min(...values).toFixed(1)+'%';
            statMax.textContent = Math.max(...values).toFixed(1)+'%';
            statCount.textContent = values.length;
        }

        function drawTrend() {
            ctxTrend.clearRect(0, 0, trendCanvas.width, trendCanvas.height);
            ctxTrend.fillStyle = '#282c34';
            ctxTrend.fillRect(0, 0, trendCanvas.width, trendCanvas.height);
            if (trendData.length < 2) return;
            const w = trendCanvas.width, h = trendCanvas.height;
            const points = trendData.slice(-30);
            const xStep = w / (points.length - 1);
            ctxTrend.beginPath(); ctxTrend.moveTo(0, h);
            for (let i = 0; i < points.length; i++) ctxTrend.lineTo(i * xStep, h - (points[i].transparency / 100) * h);
            ctxTrend.lineTo(w, h); ctxTrend.closePath();
            const g = ctxTrend.createLinearGradient(0, 0, 0, h);
            g.addColorStop(0, 'rgba(63,185,80,0.3)'); g.addColorStop(1, 'rgba(63,185,80,0)');
            ctxTrend.fillStyle = g; ctxTrend.fill();
            ctxTrend.beginPath(); ctxTrend.strokeStyle = '#3fb950'; ctxTrend.lineWidth = 2.5;
            for (let i = 0; i < points.length; i++) {
                const x = i * xStep, y = h - (points[i].transparency / 100) * h;
                i === 0 ? ctxTrend.moveTo(x, y) : ctxTrend.lineTo(x, y);
            }
            ctxTrend.stroke();
            const th = parseFloat(thresholdInput.value) || 30, yTh = h - (th / 100) * h;
            ctxTrend.beginPath(); ctxTrend.strokeStyle = '#f85149'; ctxTrend.lineWidth = 1.5;
            ctxTrend.setLineDash([6, 4]); ctxTrend.moveTo(0, yTh); ctxTrend.lineTo(w, yTh);
            ctxTrend.stroke(); ctxTrend.setLineDash([]);
        }

        function addTrendPoint(t) {
            trendData.push({ time: Date.now(), transparency: t });
            if (trendData.length > 60) trendData.shift();
            drawTrend();
        }

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: 'environment' }, width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
            } catch (e) {
                try { stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false }); }
                catch (err) { statusEl.textContent = '❌ Нет доступа к камере'; return; }
            }
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                statusEl.textContent = '✅ Камера работает';
                areaBtn.disabled = false;
                calibrateLowBtn.disabled = false;
                calibrateHighBtn.disabled = false;
                recordBtn.disabled = false;
                soundToggleBtn.disabled = false;
                snapshotBtn.disabled = false;
                exportBtn.disabled = false;
                autoRecordBtn.disabled = false;
                autoCalBtn.disabled = false;
                resetBtn.disabled = false;
                startAnalysis();
            };
        }

        function getCoords(e) {
            const r = video.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - r.left, y: cy - r.top, rectWidth: r.width, rectHeight: r.height };
        }
        let sx, sy;
        function pd(e) { if(!isSelecting) return; e.preventDefault(); const p=getCoords(e); sx=p.x; sy=p.y;
            regionSelector.style.display='block'; regionSelector.style.left=p.x+'px'; regionSelector.style.top=p.y+'px';
            regionSelector.style.width='0px'; regionSelector.style.height='0px'; }
        function pm(e) { if(!isSelecting||sx===undefined) return; e.preventDefault(); const p=getCoords(e);
            regionSelector.style.left=Math.min(sx,p.x)+'px'; regionSelector.style.top=Math.min(sy,p.y)+'px';
            regionSelector.style.width=Math.abs(p.x-sx)+'px'; regionSelector.style.height=Math.abs(p.y-sy)+'px'; }
        function pu(e) { if(!isSelecting||sx===undefined) return; e.preventDefault(); const p=getCoords(e);
            const scX=video.videoWidth/p.rectWidth, scY=video.videoHeight/p.rectHeight;
            analysisRegion={ x:Math.min(sx,p.x)*scX, y:Math.min(sy,p.y)*scY, width:Math.abs(p.x-sx)*scX, height:Math.abs(p.y-sy)*scY };
            isSelecting=false; areaBtn.textContent='🎯 Область'; removeListeners(); }
        function addListeners() {
            video.addEventListener('mousedown',pd); video.addEventListener('mousemove',pm); video.addEventListener('mouseup',pu);
            video.addEventListener('touchstart',pd,{passive:false}); video.addEventListener('touchmove',pm,{passive:false}); video.addEventListener('touchend',pu);
        }
        function removeListeners() {
            video.removeEventListener('mousedown',pd); video.removeEventListener('mousemove',pm); video.removeEventListener('mouseup',pu);
            video.removeEventListener('touchstart',pd); video.removeEventListener('touchmove',pm); video.removeEventListener('touchend',pu);
        }

        areaBtn.addEventListener('click', () => {
            if(isSelecting) { isSelecting=false; areaBtn.textContent='🎯 Область'; regionSelector.style.display='none'; removeListeners(); return; }
            if(!stream) return; isSelecting=true; areaBtn.textContent='✋ Отменить'; addListeners();
        });

        resetBtn.addEventListener('click', () => {
            analysisRegion = null;
            regionSelector.style.display = 'none';
            calibrationLow = null;
            calibrationHigh = null;
            updateCalInputs();
            if (autoCalibration.active) stopAutoCalibration();
            statusEl.textContent = '🔄 Область и калибровка сброшены';
        });

        calibrateLowBtn.addEventListener('click', () => {
            if(!stream) return; initAudio();
            calibrationLow = currentBrightness; updateCalInputs();
            statusEl.textContent = '📏 Нижний предел (100%): ' + calibrationLow.toFixed(1);
        });

        calibrateHighBtn.addEventListener('click', () => {
            if(!stream) return; initAudio();
            if(calibrationLow !== null && currentBrightness >= calibrationLow) {
                statusEl.textContent = '❌ Верхний предел не может быть ярче нижнего!'; return;
            }
            calibrationHigh = currentBrightness; updateCalInputs();
            statusEl.textContent = '⬛ Верхний предел (0%): ' + calibrationHigh.toFixed(1);
        });

        applyCalBtn.addEventListener('click', () => {
            initAudio();
            const lowVal = parseFloat(lowCalInput.value);
            const highVal = parseFloat(highCalInput.value);
            if(!isNaN(lowVal)) calibrationLow = lowVal;
            if(!isNaN(highVal)) {
                if(calibrationLow !== null && highVal >= calibrationLow) {
                    statusEl.textContent = '❌ Верхний предел не может быть ярче нижнего!'; return;
                }
                calibrationHigh = highVal;
            }
            updateCalInputs();
            statusEl.textContent = '✅ Пределы обновлены';
        });

        function addHistoryRecord() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ru-RU');
            const dateStr = now.toLocaleDateString('ru-RU');
            const threshold = parseFloat(thresholdInput.value) || 30;
            const warning = currentTransparency < threshold;
            const lowStr = calibrationLow !== null ? calibrationLow.toFixed(1) : '—';
            const highStr = calibrationHigh !== null ? calibrationHigh.toFixed(1) : '—';
            
            historyRecords.push({
                date: dateStr, time: timeStr, transparency: currentTransparency,
                brightness: currentBrightness, lowLimit: calibrationLow, highLimit: calibrationHigh, warning: warning
            });
            
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between;">
                    <span class="time">${dateStr} ${timeStr}</span>
                    <span class="warning-badge" style="color:${warning ? 'var(--red)' : 'var(--green)'}">${warning ? '⚠️' : '✅'}</span>
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:2px;">
                    <span class="transparency">${currentTransparency.toFixed(1)}%</span>
                    <span class="limits">Пределы: ${lowStr} / ${highStr}</span>
                </div>
            `;
            historyList.prepend(div);
            updateStatistics();
        }
        
        recordBtn.addEventListener('click', () => { if(!stream) return; addHistoryRecord(); });
        clearHistoryBtn.addEventListener('click', () => { historyList.innerHTML = ''; historyRecords = []; updateStatistics(); });

        snapshotBtn.addEventListener('click', () => {
            if(!stream) return;
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d'); ctx.drawImage(video, 0, 0);
            ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, canvas.width, 60);
            ctx.fillStyle = '#3fb950'; ctx.font = 'bold 24px sans-serif';
            ctx.fillText('Прозрачность: ' + currentTransparency.toFixed(1) + '%', 20, 40);
            const link = document.createElement('a');
            link.download = 'transparency_' + new Date().toISOString().slice(0,19).replace(/:/g,'-') + '.png';
            link.href = canvas.toDataURL('image/png'); link.click();
            statusEl.textContent = '📸 Снимок сохранён';
        });

        exportBtn.addEventListener('click', () => {
            if(historyRecords.length === 0) { statusEl.textContent = '❌ Нет данных'; return; }
            let csv = 'Дата;Время;Прозрачность(%);Яркость;Нижний предел;Верхний предел;Статус\n';
            historyRecords.forEach(r => {
                csv += `${r.date};${r.time};${r.transparency.toFixed(1)};${r.brightness.toFixed(1)};${r.lowLimit!==null?r.lowLimit.toFixed(1):'—'};${r.highLimit!==null?r.highLimit.toFixed(1):'—'};${r.warning?'WARNING':'Норма'}\n`;
            });
            const blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.download = 'transparency_data_'+new Date().toISOString().slice(0,10)+'.csv';
            link.href = URL.createObjectURL(blob); link.click();
            statusEl.textContent = '📊 Экспорт выполнен ('+historyRecords.length+' записей)';
        });

        autoRecordBtn.addEventListener('click', () => {
            if(autoRecordTimer) {
                clearInterval(autoRecordTimer); autoRecordTimer = null;
                timerRow.style.display = 'none'; autoRecordBtn.textContent = '⏱️ Авто';
                statusEl.textContent = 'Авто-запись остановлена'; return;
            }
            const interval = parseInt(timerInterval.value) || 5;
            timerRow.style.display = 'flex'; autoRecordBtn.textContent = '⏸️ Стоп';
            autoRecordSeconds = interval; timerCountdown.textContent = autoRecordSeconds + ' сек';
            const countdownInterval = setInterval(() => {
                autoRecordSeconds--;
                timerCountdown.textContent = autoRecordSeconds > 0 ? autoRecordSeconds + ' сек' : 'Запись!';
                if(autoRecordSeconds <= 0) autoRecordSeconds = interval;
            }, 1000);
            autoRecordTimer = setInterval(() => { if(!stream) return; addHistoryRecord(); }, interval * 1000);
            stopAutoBtn.onclick = () => {
                clearInterval(autoRecordTimer); clearInterval(countdownInterval);
                autoRecordTimer = null; timerRow.style.display = 'none';
                autoRecordBtn.textContent = '⏱️ Авто'; statusEl.textContent = 'Авто-запись остановлена';
            };
            statusEl.textContent = '⏱️ Авто-запись каждые ' + interval + ' сек';
        });

        autoCalBtn.addEventListener('click', startAutoCalibration);

        soundToggleBtn.addEventListener('click', () => {
            initAudio();
            soundEnabled = !soundEnabled;
            soundToggleBtn.textContent = soundEnabled ? '🔊 Звук' : '🔇 Без звука';
            soundDot.classList.toggle('muted', !soundEnabled);
            soundStatusEl.textContent = soundEnabled ? 'Звук включён' : 'Звук выключен';
        });

        function analyzeFrame() {
            if(!stream || video.readyState < 2) { animationId = requestAnimationFrame(analyzeFrame); return; }
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d'); ctx.drawImage(video, 0, 0);
            let img;
            if(analysisRegion) {
                const rx=Math.max(0,Math.min(analysisRegion.x,canvas.width-1)), ry=Math.max(0,Math.min(analysisRegion.y,canvas.height-1));
                const rw=Math.max(1,Math.min(analysisRegion.width,canvas.width-rx)), rh=Math.max(1,Math.min(analysisRegion.height,canvas.height-ry));
                img = ctx.getImageData(rx, ry, rw, rh);
            } else img = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = img.data; let total = 0;
            for(let i=0; i<data.length; i+=4) total += 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
            currentBrightness = total / (data.length/4);
            if(calibrationLow!==null && calibrationHigh!==null && calibrationLow>calibrationHigh)
                currentTransparency = ((currentBrightness-calibrationHigh)/(calibrationLow-calibrationHigh))*100;
            else if(calibrationLow!==null)
                currentTransparency = (currentBrightness/calibrationLow)*100;
            else
                currentTransparency = (currentBrightness/255)*100;
            currentTransparency = Math.max(0, Math.min(100, currentTransparency));
            transparencyEl.textContent = currentTransparency.toFixed(1)+'%';
            brightnessEl.textContent = currentBrightness.toFixed(1);
            indicatorEl.style.left = currentTransparency+'%';
            meterFill.style.width = currentTransparency+'%';
            const threshold = parseFloat(thresholdInput.value)||30;
            if(currentTransparency < threshold) {
                warningMsg.textContent = '⚠️ WARNING: Прозрачность ниже порога!';
                warningMsg.classList.add('active'); playCalmBeep();
            } else { warningMsg.textContent = ''; warningMsg.classList.remove('active'); }
            addTrendPoint(currentTransparency);
            animationId = requestAnimationFrame(analyzeFrame);
        }

        function startAnalysis() { if(animationId) cancelAnimationFrame(animationId); analyzeFrame(); }

        document.addEventListener('click', initAudio, { once: true });
        document.addEventListener('touchstart', initAudio, { once: true });

        window.addEventListener('load', () => {
            if(!navigator.mediaDevices?.getUserMedia) { statusEl.textContent='❌ Браузер не поддерживает камеру'; return; }
            startCamera();
        });
        window.addEventListener('beforeunload', () => {
            if(stream) stream.getTracks().forEach(t=>t.stop());
            if(autoRecordTimer) clearInterval(autoRecordTimer);
            if(autoCalibration.active) stopAutoCalibration();
        });
    </script>
</body>
</html>
