<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Прозрачность жидкости</title>
    <style>
        :root {
            --bg: #1a1d23; --card: #21252b; --surface: #282c34; --text: #e1e4e8;
            --text-secondary: #959da5; --blue: #58a6ff; --green: #3fb950; --orange: #f0883e;
            --red: #f85149; --purple: #bc8cff; --yellow: #d2991d; --border: #30363d;
            --shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .light-theme {
            --bg: #f5f7fa; --card: #ffffff; --surface: #f0f2f5; --text: #1a1d23;
            --text-secondary: #666; --border: #ddd; --shadow: 0 8px 24px rgba(0,0,0,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 15px; transition: background 0.3s;
        }
        .container {
            width: 100%; max-width: 600px; background: var(--card); border-radius: 24px;
            padding: 20px 16px; box-shadow: var(--shadow); text-align: center;
            border: 1px solid var(--border); transition: all 0.3s;
        }
        .header { margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .header-left { text-align: left; }
        h1 { font-size: 1.4rem; color: var(--text); font-weight: 700; margin-bottom: 2px; }
        #datetime { font-size: 0.8rem; color: var(--text-secondary); }
        #themeToggleBtn {
            background: var(--surface); border: 1px solid var(--border); color: var(--text);
            padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 0.8rem;
        }
        
        /* Блок IP-камеры */
        .ip-camera-row {
            display: flex; gap: 6px; align-items: center; justify-content: center;
            margin: 8px 0; flex-wrap: wrap;
        }
        .ip-camera-row input {
            flex: 1 1 auto; min-width: 160px; padding: 8px 10px; border-radius: 8px;
            border: 1px solid var(--border); background: var(--surface); color: var(--text);
            font-size: 0.8rem; text-align: left;
        }
        .ip-camera-row input::placeholder { color: var(--text-secondary); font-size: 0.7rem; }
        .ip-camera-row button {
            flex: 0 0 auto; min-width: 70px; padding: 8px 10px; font-size: 0.7rem;
        }
        .ip-camera-row select {
            padding: 8px 6px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text); font-size: 0.75rem;
        }
        .camera-status {
            font-size: 0.7rem; color: var(--text-secondary); margin: 4px 0;
        }
        .camera-status .active-source { color: var(--green); font-weight: 600; }
        
        .video-wrapper {
            position: relative; width: 100%; aspect-ratio: 4/3; background: #000;
            border-radius: 16px; overflow: hidden; margin: 12px 0;
            border: 2px solid var(--border);
        }
        video { width: 100%; height: 100%; object-fit: cover; display: block; }
        .video-overlay {
            position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
            pointer-events: none; z-index: 10;
        }
        .video-overlay canvas { width: 100%; height: 100%; }
        .region-selector {
            position: absolute; border: 2px dashed var(--yellow); background: rgba(210,153,29,0.2);
            pointer-events: none; display: none; z-index: 5; border-radius: 4px;
        }
        .record-indicator {
            position: absolute; top: 10px; right: 10px; width: 12px; height: 12px;
            background: var(--red); border-radius: 50%; display: none; z-index: 15;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        
        .controls { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 8px 0; }
        button {
            flex: 1 1 auto; min-width: 60px; padding: 10px 5px; border: 1px solid var(--border);
            border-radius: 12px; background: var(--surface); color: var(--text); font-size: 0.73rem;
            font-weight: 600; cursor: pointer; transition: all 0.2s; touch-action: manipulation;
        }
        button:active { transform: scale(0.96); }
        button:disabled { background: #1c1f26; color: #555; cursor: not-allowed; }
        .light-theme button:disabled { background: #ddd; color: #999; }
        .btn-green { background: #1a3a2a; border-color: var(--green); color: var(--green); }
        .btn-gray { background: #2a2d35; border-color: #555; color: #bbb; }
        .btn-red { background: #3a1a1a; border-color: var(--red); color: var(--red); }
        .btn-blue { background: #1a2a3a; border-color: var(--blue); color: var(--blue); }
        .btn-purple { background: #2a1a3a; border-color: var(--purple); color: var(--purple); }
        .btn-yellow { background: #3a3a1a; border-color: var(--yellow); color: var(--yellow); }
        .btn-cyan { background: #1a3a3a; border-color: #56d4dd; color: #56d4dd; }
        .btn-orange { background: #3a2a1a; border-color: var(--orange); color: var(--orange); }
        .light-theme .btn-green { background:#d4edda; color:#155724; }
        .light-theme .btn-gray { background:#e2e3e5; color:#383d41; }
        .light-theme .btn-red { background:#f8d7da; color:#721c24; }
        .light-theme .btn-blue { background:#d1ecf1; color:#0c5460; }
        .light-theme .btn-purple { background:#e8daef; color:#6c3483; }
        .light-theme .btn-yellow { background:#fff3cd; color:#856404; }
        .light-theme .btn-cyan { background:#d1ecf1; color:#0c5460; }
        .light-theme .btn-orange { background:#ffe5d0; color:#a04000; }
        
        .calibration-inputs {
            display: flex; gap: 8px; justify-content: center; align-items: center;
            margin: 8px 0; flex-wrap: wrap; font-size: 0.75rem; color: var(--text-secondary);
        }
        .calibration-inputs input {
            width: 70px; padding: 6px 8px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text); font-size: 0.8rem; text-align: center;
        }
        .threshold-row {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin: 8px 0; color: var(--text-secondary); font-size: 0.8rem;
        }
        .threshold-row input {
            width: 55px; padding: 6px 8px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text); font-size: 0.85rem; text-align: center;
        }
        .warning-text {
            color: var(--red); font-weight: 600; font-size: 1rem; margin: 6px 0; min-height: 1.3em;
        }
        .warning-text.active { animation: warningPulse 1.5s infinite; }
        @keyframes warningPulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
        
        .result-card {
            background: var(--surface); border-radius: 16px; padding: 14px; margin-top: 8px;
            border: 1px solid var(--border);
        }
        .meter {
            width: 100%; height: 24px; background: linear-gradient(to right,#1a1a1a,#2a2a2a,#3a3a3a,#e0e0e0);
            border-radius: 12px; margin: 10px 0; position: relative; overflow: hidden;
            border: 1px solid var(--border);
        }
        .light-theme .meter { background: linear-gradient(to right,#ddd,#bbb,#999,#fff); }
        .meter-fill {
            position: absolute; top: 0; left: 0; height: 100%;
            background: linear-gradient(90deg,#3fb95044,#3fb95088);
            border-radius: 12px 0 0 12px; transition: width 0.3s;
        }
        .indicator {
            position: absolute; top: -3px; width: 4px; height: 30px; background: var(--text);
            border-radius: 2px; transition: left 0.2s;
        }
        .stats { display: flex; justify-content: space-around; font-size: 0.9rem; margin: 6px 0; color: var(--text-secondary); }
        .value { font-weight: 700; font-size: 1.4rem; color: var(--text); }
        #statusText { font-size: 0.8rem; color: var(--text-secondary); margin-top: 6px; }
        
        .auto-cal-progress { margin: 8px 0; font-size: 0.75rem; color: var(--text-secondary); }
        .progress-bar {
            width: 100%; height: 6px; background: var(--surface); border-radius: 3px;
            margin: 4px 0; overflow: hidden;
        }
        .progress-fill { height: 100%; background: var(--orange); border-radius: 3px; transition: width 0.5s; }
        
        .statistics {
            background: var(--surface); border-radius: 12px; padding: 10px; margin-top: 8px;
            border: 1px solid var(--border); font-size: 0.75rem; color: var(--text-secondary);
            display: flex; flex-wrap: wrap; justify-content: space-around; gap: 8px;
        }
        .stat-value { font-weight: 700; color: var(--text); font-size: 1rem; }
        
        .history {
            margin-top: 14px; text-align: left; max-height: 200px; overflow-y: auto;
            border-top: 1px solid var(--border); padding-top: 10px;
        }
        .history h3 { margin-bottom: 8px; color: var(--text); font-size: 0.9rem; }
        .history-item {
            font-size: 0.72rem; padding: 6px 8px; background: var(--surface); border-radius: 8px;
            margin-bottom: 4px; color: var(--text-secondary);
        }
        .clear-history {
            font-size: 0.7rem; color: var(--red); cursor: pointer; background: none; border: none;
            padding: 4px 0; margin-top: 4px;
        }
        .trend-canvas {
            width: 100%; height: 130px; background: var(--surface); border-radius: 12px;
            border: 1px solid var(--border); margin-top: 10px;
        }
        .timer-row {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin: 8px 0; color: var(--text-secondary); font-size: 0.75rem;
        }
        .timer-row input { width: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left"><h1>💧 Прозрачность жидкости</h1><div id="datetime"></div></div>
            <button id="themeToggleBtn">☀️ Светлая</button>
        </div>
        
        <!-- Блок IP-камеры -->
        <div class="ip-camera-row">
            <input type="text" id="ipCameraInput" placeholder="IP-адрес (http://192.168.1.100:8080/video)">
            <button id="connectIpBtn" class="btn-cyan">📡 Подключить</button>
            <button id="disconnectIpBtn" class="btn-red" disabled>✕</button>
        </div>
        <div class="camera-status">
            Источник: <span class="active-source" id="cameraSource">встроенная камера</span>
        </div>
        
        <div class="video-wrapper" id="videoWrapper">
            <video id="video" autoplay playsinline muted></video>
            <div class="video-overlay"><canvas id="overlayCanvas"></canvas></div>
            <div class="region-selector" id="regionSelector"></div>
            <div class="record-indicator" id="recordIndicator"></div>
        </div>
        
        <div class="controls">
            <button id="areaBtn" disabled>🎯 Область</button>
            <button id="resetBtn" class="btn-red" disabled>🔄 Сброс</button>
            <button id="calibrateLowBtn" class="btn-green" disabled>📏 Нижний</button>
            <button id="calibrateHighBtn" class="btn-gray" disabled>⬛ Верхний</button>
            <button id="recordBtn" class="btn-blue" disabled>📝 Запись</button>
        </div>
        <div class="controls">
            <button id="soundToggleBtn" class="btn-purple" disabled>🔊 Звук</button>
            <button id="snapshotBtn" class="btn-cyan" disabled>📸 Снимок</button>
            <button id="videoRecordBtn" class="btn-red" disabled>🎥 Видео</button>
            <button id="exportBtn" class="btn-yellow" disabled>📊 Экспорт</button>
            <button id="autoRecordBtn" class="btn-blue" disabled>⏱️ Авто</button>
            <button id="autoCalBtn" class="btn-orange" disabled>🔬 Авто.калибр</button>
        </div>
        
        <div class="auto-cal-progress" id="autoCalProgress" style="display:none;">
            <span id="autoCalPhase">⚡ Авто-калибровка активна</span>
            <span id="autoCalTimer" style="margin-left:10px;">00:00</span>
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        </div>
        <div class="timer-row" id="timerRow" style="display:none;">
            <label>Интервал (сек):</label>
            <input type="number" id="timerInterval" value="5" min="1" max="60" step="1">
            <span id="timerCountdown">—</span>
            <button id="stopAutoBtn" class="btn-red" style="flex:0 0 auto; min-width:40px;">✕</button>
        </div>
        <div class="calibration-inputs">
            <label>Нижний (100%):</label><input type="number" id="lowCalInput" placeholder="Авто" step="0.1">
            <label>Верхний (0%):</label><input type="number" id="highCalInput" placeholder="Авто" step="0.1">
            <button id="applyCalBtn" class="btn-blue" style="flex:0 0 auto; min-width:45px;">✓</button>
        </div>
        <div class="threshold-row">
            <label for="threshold">⚠️ Порог:</label>
            <input type="number" id="threshold" value="30" min="0" max="100" step="1"><span>%</span>
        </div>
        <div id="warningMessage" class="warning-text"></div>
        <div class="result-card">
            <div class="stats">
                <span>Прозрачность <span class="value" id="transparencyValue">0%</span></span>
                <span>Яркость <span class="value" id="brightnessValue">0</span></span>
            </div>
            <div class="meter"><div class="meter-fill" id="meterFill" style="width:0%"></div><div class="indicator" id="indicator" style="left:0%"></div></div>
            <div id="statusText">Загрузка камеры...</div>
        </div>
        <div class="statistics" id="statistics">
            <div>Среднее: <span class="stat-value" id="statAvg">—</span></div>
            <div>Мин: <span class="stat-value" id="statMin">—</span></div>
            <div>Макс: <span class="stat-value" id="statMax">—</span></div>
            <div>Измерений: <span class="stat-value" id="statCount">0</span></div>
        </div>
        <canvas id="trendCanvas" class="trend-canvas" width="500" height="130"></canvas>
        <div class="history" id="historyContainer">
            <h3>📋 История измерений</h3>
            <div id="historyList"></div>
            <button class="clear-history" id="clearHistoryBtn">Очистить историю</button>
        </div>
    </div>

    <script>
        // ===== DOM =====
        const video = document.getElementById('video');
        const overlayCanvas = document.getElementById('overlayCanvas');
        const overlayCtx = overlayCanvas.getContext('2d');
        const ipCameraInput = document.getElementById('ipCameraInput');
        const connectIpBtn = document.getElementById('connectIpBtn');
        const disconnectIpBtn = document.getElementById('disconnectIpBtn');
        const cameraSource = document.getElementById('cameraSource');
        const areaBtn = document.getElementById('areaBtn'), resetBtn = document.getElementById('resetBtn');
        const calibrateLowBtn = document.getElementById('calibrateLowBtn'), calibrateHighBtn = document.getElementById('calibrateHighBtn');
        const recordBtn = document.getElementById('recordBtn'), soundToggleBtn = document.getElementById('soundToggleBtn');
        const snapshotBtn = document.getElementById('snapshotBtn'), videoRecordBtn = document.getElementById('videoRecordBtn');
        const exportBtn = document.getElementById('exportBtn'), autoRecordBtn = document.getElementById('autoRecordBtn');
        const autoCalBtn = document.getElementById('autoCalBtn'), themeToggleBtn = document.getElementById('themeToggleBtn');
        const transparencyEl = document.getElementById('transparencyValue'), brightnessEl = document.getElementById('brightnessValue');
        const indicatorEl = document.getElementById('indicator'), meterFill = document.getElementById('meterFill'), statusEl = document.getElementById('statusText');
        const regionSelector = document.getElementById('regionSelector'), recordIndicator = document.getElementById('recordIndicator');
        const thresholdInput = document.getElementById('threshold'), warningMsg = document.getElementById('warningMessage');
        const datetimeEl = document.getElementById('datetime'), historyList = document.getElementById('historyList'), clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const trendCanvas = document.getElementById('trendCanvas'), ctxTrend = trendCanvas.getContext('2d');
        const lowCalInput = document.getElementById('lowCalInput'), highCalInput = document.getElementById('highCalInput'), applyCalBtn = document.getElementById('applyCalBtn');
        const statAvg = document.getElementById('statAvg'), statMin = document.getElementById('statMin'), statMax = document.getElementById('statMax'), statCount = document.getElementById('statCount');
        const autoCalProgress = document.getElementById('autoCalProgress'), autoCalPhase = document.getElementById('autoCalPhase');
        const autoCalTimer = document.getElementById('autoCalTimer'), progressFill = document.getElementById('progressFill');
        const timerRow = document.getElementById('timerRow'), timerInterval = document.getElementById('timerInterval');
        const timerCountdown = document.getElementById('timerCountdown'), stopAutoBtn = document.getElementById('stopAutoBtn');
        const soundDot = document.getElementById('soundDot'), soundStatusEl = document.getElementById('soundStatus');

        // ===== Состояние =====
        let stream = null, analysisRegion = null, isSelecting = false, animationId = null;
        let calibrationLow = null, calibrationHigh = null;
        let currentTransparency = 0, currentBrightness = 0, trendData = [];
        let audioCtx = null, soundEnabled = true, lastBeepTime = 0, beepInterval = 2000;
        let autoRecordTimer = null, autoRecordSeconds = 0, historyRecords = [];
        let isDarkTheme = true, mediaRecorder = null, recordedChunks = [], isRecording = false;
        let recordingCanvas = null, recordingCtx = null, recordingStream = null;
        let ipStream = null, ipVideoElement = null;

        // ===== IP-камера (через CORS-прокси) =====
        const CORS_PROXIES = [
            (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
            (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
            (url) => `https://proxy.cors.sh/${url}`,
        ];

        async function connectToIpCamera() {
            let address = ipCameraInput.value.trim();
            if (!address) {
                statusEl.textContent = '❌ Введите IP-адрес камеры';
                return;
            }

            statusEl.textContent = '📡 Подключение к IP-камере...';
            connectIpBtn.disabled = true;

            // Добавляем http:// если нет протокола
            if (!address.startsWith('http://') && !address.startsWith('https://')) {
                address = 'http://' + address;
            }

            // Пробуем прямое подключение (работает при открытии файла локально)
            let connected = await tryDirectConnect(address);
            
            // Если не вышло — пробуем через прокси
            if (!connected) {
                for (const proxyFn of CORS_PROXIES) {
                    const proxyUrl = proxyFn(address);
                    console.log('Пробуем прокси:', proxyUrl);
                    connected = await tryDirectConnect(proxyUrl);
                    if (connected) break;
                }
            }

            if (connected) {
                // Останавливаем встроенную камеру
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                    stream = null;
                }
                
                cameraSource.textContent = 'IP-камера: ' + address;
                cameraSource.style.color = 'var(--green)';
                disconnectIpBtn.disabled = false;
                connectIpBtn.disabled = false;
                statusEl.textContent = '✅ IP-камера подключена';
            } else {
                statusEl.textContent = '❌ Не удалось подключиться. Проверьте адрес или откройте страницу локально.';
                connectIpBtn.disabled = false;
            }
        }

        async function tryDirectConnect(url) {
            return new Promise((resolve) => {
                const testVideo = document.createElement('video');
                testVideo.crossOrigin = 'anonymous';
                testVideo.muted = true;
                testVideo.playsInline = true;
                testVideo.autoplay = true;

                const timeout = setTimeout(() => {
                    testVideo.src = '';
                    resolve(false);
                }, 8000);

                testVideo.onloadedmetadata = () => {
                    clearTimeout(timeout);
                    testVideo.play().then(() => {
                        // Создаём MediaStream из video
                        if (testVideo.captureStream) {
                            ipStream = testVideo.captureStream();
                        } else {
                            const canvas = document.createElement('canvas');
                            canvas.width = testVideo.videoWidth || 640;
                            canvas.height = testVideo.videoHeight || 480;
                            const ctx = canvas.getContext('2d');
                            setInterval(() => {
                                if (testVideo.readyState >= 2) {
                                    canvas.width = testVideo.videoWidth;
                                    canvas.height = testVideo.videoHeight;
                                    ctx.drawImage(testVideo, 0, 0);
                                }
                            }, 1000 / 30);
                            ipStream = canvas.captureStream(30);
                        }
                        
                        ipVideoElement = testVideo;
                        video.srcObject = ipStream;
                        enableButtons();
                        if (!animationId) startAnalysis();
                        resolve(true);
                    }).catch(() => {
                        resolve(false);
                    });
                };

                testVideo.onerror = () => {
                    clearTimeout(timeout);
                    resolve(false);
                };

                testVideo.src = url;
            });
        }

        function disconnectIpCamera() {
            if (ipStream) {
                ipStream.getTracks().forEach(t => t.stop());
                ipStream = null;
            }
            if (ipVideoElement) {
                ipVideoElement.src = '';
                ipVideoElement = null;
            }
            video.srcObject = null;
            cameraSource.textContent = 'встроенная камера';
            cameraSource.style.color = 'var(--green)';
            disconnectIpBtn.disabled = true;
            
            // Запускаем встроенную камеру
            startCamera();
        }

        // ===== Встроенная камера =====
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: 'environment' }, width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
            } catch (e) {
                try { stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false }); }
                catch (err) { statusEl.textContent = '❌ Нет доступа к камере'; return; }
            }
            video.srcObject = stream;
            cameraSource.textContent = 'встроенная камера';
            cameraSource.style.color = 'var(--green)';
            video.onloadedmetadata = () => {
                video.play();
                statusEl.textContent = '✅ Камера работает';
                enableButtons();
                startAnalysis();
            };
        }

        // ===== Авто-калибровка =====
        let autoCalibration = {
            active: false, startTime: 0, totalDuration: 20 * 60 * 1000,
            intervalId: null, elapsedSeconds: 0
        };

        function startAutoCalibration() {
            if (autoCalibration.active) { stopAutoCalibration(); return; }
            if (!stream && !ipStream) return;
            
            autoCalibration.active = true;
            autoCalibration.startTime = Date.now();
            autoCalibration.elapsedSeconds = 0;
            
            autoCalBtn.textContent = '⏹️ Стоп калибр';
            autoCalProgress.style.display = 'block';
            autoCalPhase.textContent = '⚡ Авто-калибровка активна';
            progressFill.style.width = '0%';
            
            if (calibrationLow === null) { calibrationLow = currentBrightness; updateCalInputs(); logAutoCalibration('📏 Начальный нижний предел: ' + calibrationLow.toFixed(1)); }
            if (calibrationHigh === null) { calibrationHigh = currentBrightness; updateCalInputs(); logAutoCalibration('⬛ Начальный верхний предел: ' + calibrationHigh.toFixed(1)); }
            
            autoCalibration.intervalId = setInterval(() => {
                const elapsed = Date.now() - autoCalibration.startTime;
                autoCalibration.elapsedSeconds = Math.floor(elapsed / 1000);
                const m = Math.floor(autoCalibration.elapsedSeconds / 60), s = autoCalibration.elapsedSeconds % 60;
                autoCalTimer.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                progressFill.style.width = Math.min(100, (elapsed / autoCalibration.totalDuration) * 100) + '%';
                
                if (autoCalibration.elapsedSeconds >= 5 && autoCalibration.elapsedSeconds % 5 === 0) {
                    if (currentBrightness > calibrationLow) {
                        calibrationLow = currentBrightness;
                        updateCalInputs();
                        logAutoCalibration('📏 Новый нижний предел: ' + calibrationLow.toFixed(1));
                    }
                    if (calibrationLow !== null && currentBrightness < calibrationHigh && currentBrightness < calibrationLow) {
                        calibrationHigh = currentBrightness;
                        updateCalInputs();
                        logAutoCalibration('⬛ Новый верхний предел: ' + calibrationHigh.toFixed(1));
                    }
                }
                
                if (elapsed >= autoCalibration.totalDuration) {
                    stopAutoCalibration();
                    statusEl.textContent = '🔬 Авто-калибровка завершена (20 мин)';
                }
            }, 1000);
            
            statusEl.textContent = '🔬 Авто-калибровка запущена (20 мин)';
        }

        function stopAutoCalibration() {
            autoCalibration.active = false;
            if (autoCalibration.intervalId) clearInterval(autoCalibration.intervalId);
            autoCalBtn.textContent = '🔬 Авто.калибр';
            autoCalProgress.style.display = 'none';
            logAutoCalibration('⏹️ Авто-калибровка остановлена');
        }

        function logAutoCalibration(msg) {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span style="font-size:0.7rem;color:var(--text-secondary)">${new Date().toLocaleTimeString('ru-RU')}</span> <span style="color:var(--orange)">🔬 ${msg}</span>`;
            historyList.prepend(div);
        }

        // ===== Тема =====
        function toggleTheme() { isDarkTheme = !isDarkTheme; document.body.classList.toggle('light-theme', !isDarkTheme); themeToggleBtn.textContent = isDarkTheme ? '☀️ Светлая' : '🌙 Тёмная'; drawTrend(); }

        // ===== Звук =====
        function initAudio() { if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); } }
        function playCalmBeep() {
            if (!soundEnabled || !audioCtx) return;
            const now = Date.now(); if (now - lastBeepTime < beepInterval) return; lastBeepTime = now;
            const t = audioCtx.currentTime;
            const tone = (f, st, d, v) => { const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.type = 'sine'; o.frequency.setValueAtTime(f, st); g.gain.setValueAtTime(0, st); g.gain.linearRampToValueAtTime(v, st+0.05); g.gain.linearRampToValueAtTime(0, st+d); o.start(st); o.stop(st+d); };
            tone(440, t, 0.3, 0.08); tone(554, t+0.2, 0.25, 0.06);
            beepInterval = Math.max(800, 3000 - currentTransparency * 30);
        }

        function updateDateTime() { datetimeEl.textContent = new Date().toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' }); }
        setInterval(updateDateTime, 1000); updateDateTime();

        function updateCalInputs() { lowCalInput.value = calibrationLow !== null ? calibrationLow.toFixed(1) : ''; highCalInput.value = calibrationHigh !== null ? calibrationHigh.toFixed(1) : ''; }
        function updateStatistics() {
            if (!historyRecords.length) { statAvg.textContent='—'; statMin.textContent='—'; statMax.textContent='—'; statCount.textContent='0'; return; }
            const v = historyRecords.map(r=>r.transparency);
            statAvg.textContent = (v.reduce((a,b)=>a+b,0)/v.length).toFixed(1)+'%'; statMin.textContent = Math.min(...v).toFixed(1)+'%'; statMax.textContent = Math.max(...v).toFixed(1)+'%'; statCount.textContent = v.length;
        }

        function drawVideoOverlay() {
            overlayCanvas.width = video.videoWidth || 640; overlayCanvas.height = 80;
            overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            overlayCtx.fillStyle = 'rgba(0,0,0,0.5)'; overlayCtx.fillRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            if (trendData.length < 2) return;
            const pts = trendData.slice(-30), w = overlayCanvas.width, h = overlayCanvas.height, xs = w/(pts.length-1);
            overlayCtx.beginPath(); overlayCtx.strokeStyle = '#3fb950'; overlayCtx.lineWidth = 2;
            for (let i = 0; i < pts.length; i++) { const x = i*xs, y = h-20-(pts[i].transparency/100)*(h-30); i === 0 ? overlayCtx.moveTo(x,y) : overlayCtx.lineTo(x,y); }
            overlayCtx.stroke(); overlayCtx.fillStyle = '#3fb950'; overlayCtx.font = 'bold 14px sans-serif'; overlayCtx.fillText(`${currentTransparency.toFixed(1)}%`, 10, 20);
        }

        function drawTrend() {
            ctxTrend.clearRect(0, 0, trendCanvas.width, trendCanvas.height);
            ctxTrend.fillStyle = isDarkTheme ? '#282c34' : '#f0f2f5'; ctxTrend.fillRect(0, 0, trendCanvas.width, trendCanvas.height);
            if (trendData.length < 2) return;
            const w = trendCanvas.width, h = trendCanvas.height, pts = trendData.slice(-30), xs = w/(pts.length-1);
            ctxTrend.beginPath(); ctxTrend.moveTo(0, h);
            for (let i = 0; i < pts.length; i++) ctxTrend.lineTo(i*xs, h-(pts[i].transparency/100)*h);
            ctxTrend.lineTo(w, h); ctxTrend.closePath();
            const g = ctxTrend.createLinearGradient(0,0,0,h); g.addColorStop(0,'rgba(63,185,80,0.3)'); g.addColorStop(1,'rgba(63,185,80,0)'); ctxTrend.fillStyle = g; ctxTrend.fill();
            ctxTrend.beginPath(); ctxTrend.strokeStyle = '#3fb950'; ctxTrend.lineWidth = 2.5;
            for (let i = 0; i < pts.length; i++) { const x = i*xs, y = h-(pts[i].transparency/100)*h; i === 0 ? ctxTrend.moveTo(x,y) : ctxTrend.lineTo(x,y); }
            ctxTrend.stroke();
            const th = parseFloat(thresholdInput.value)||30;
            ctxTrend.beginPath(); ctxTrend.strokeStyle = '#f85149'; ctxTrend.lineWidth = 1.5; ctxTrend.setLineDash([6,4]); ctxTrend.moveTo(0, h-(th/100)*h); ctxTrend.lineTo(w, h-(th/100)*h); ctxTrend.stroke(); ctxTrend.setLineDash([]);
            drawVideoOverlay();
        }

        function addTrendPoint(t) { trendData.push({ time: Date.now(), transparency: t }); if (trendData.length > 60) trendData.shift(); drawTrend(); }

        function enableButtons() {
            areaBtn.disabled = false; calibrateLowBtn.disabled = false; calibrateHighBtn.disabled = false;
            recordBtn.disabled = false; soundToggleBtn.disabled = false; snapshotBtn.disabled = false;
            videoRecordBtn.disabled = false; exportBtn.disabled = false; autoRecordBtn.disabled = false;
            autoCalBtn.disabled = false; resetBtn.disabled = false;
        }

        // ===== Выбор области =====
        function getCoords(e) { const r = video.getBoundingClientRect(); return { x: (e.touches?e.touches[0].clientX:e.clientX)-r.left, y: (e.touches?e.touches[0].clientY:e.clientY)-r.top, rw: r.width, rh: r.height }; }
        let sx, sy;
        function pd(e) { if(!isSelecting) return; e.preventDefault(); const p=getCoords(e); sx=p.x; sy=p.y; regionSelector.style.display='block'; regionSelector.style.left=p.x+'px'; regionSelector.style.top=p.y+'px'; regionSelector.style.width='0px'; regionSelector.style.height='0px'; }
        function pm(e) { if(!isSelecting||sx===undefined) return; e.preventDefault(); const p=getCoords(e); regionSelector.style.left=Math.min(sx,p.x)+'px'; regionSelector.style.top=Math.min(sy,p.y)+'px'; regionSelector.style.width=Math.abs(p.x-sx)+'px'; regionSelector.style.height=Math.abs(p.y-sy)+'px'; }
        function pu(e) { if(!isSelecting||sx===undefined) return; e.preventDefault(); const p=getCoords(e); const scX=video.videoWidth/p.rw, scY=video.videoHeight/p.rh; analysisRegion={ x:Math.min(sx,p.x)*scX, y:Math.min(sy,p.y)*scY, width:Math.abs(p.x-sx)*scX, height:Math.abs(p.y-sy)*scY }; isSelecting=false; areaBtn.textContent='🎯 Область'; removeListeners(); }
        function addListeners() { video.addEventListener('mousedown',pd); video.addEventListener('mousemove',pm); video.addEventListener('mouseup',pu); video.addEventListener('touchstart',pd,{passive:false}); video.addEventListener('touchmove',pm,{passive:false}); video.addEventListener('touchend',pu); }
        function removeListeners() { video.removeEventListener('mousedown',pd); video.removeEventListener('mousemove',pm); video.removeEventListener('mouseup',pu); video.removeEventListener('touchstart',pd); video.removeEventListener('touchmove',pm); video.removeEventListener('touchend',pu); }

        areaBtn.addEventListener('click', ()=>{ if(isSelecting) { isSelecting=false; areaBtn.textContent='🎯 Область'; regionSelector.style.display='none'; removeListeners(); return; } if(!stream && !ipStream) return; isSelecting=true; areaBtn.textContent='✋ Отменить'; addListeners(); });
        resetBtn.addEventListener('click', ()=>{ analysisRegion=null; regionSelector.style.display='none'; calibrationLow=null; calibrationHigh=null; updateCalInputs(); if(autoCalibration.active) stopAutoCalibration(); statusEl.textContent='🔄 Сброшено'; });
        calibrateLowBtn.addEventListener('click', ()=>{ if(!stream && !ipStream) return; initAudio(); calibrationLow=currentBrightness; updateCalInputs(); statusEl.textContent='📏 Нижний: '+calibrationLow.toFixed(1); });
        calibrateHighBtn.addEventListener('click', ()=>{ if(!stream && !ipStream) return; initAudio(); if(calibrationLow!==null && currentBrightness>=calibrationLow) { statusEl.textContent='❌ Ошибка!'; return; } calibrationHigh=currentBrightness; updateCalInputs(); statusEl.textContent='⬛ Верхний: '+calibrationHigh.toFixed(1); });
        applyCalBtn.addEventListener('click', ()=>{ const l=parseFloat(lowCalInput.value), h=parseFloat(highCalInput.value); if(!isNaN(l)) calibrationLow=l; if(!isNaN(h)) { if(calibrationLow!==null && h>=calibrationLow) { statusEl.textContent='❌ Ошибка!'; return; } calibrationHigh=h; } updateCalInputs(); statusEl.textContent='✅ Обновлено'; });

        function addHistoryRecord() {
            const now=new Date(), th=parseFloat(thresholdInput.value)||30, w=currentTransparency<th;
            historyRecords.push({ date: now.toLocaleDateString('ru-RU'), time: now.toLocaleTimeString('ru-RU'), transparency: currentTransparency, brightness: currentBrightness, lowLimit: calibrationLow, highLimit: calibrationHigh, warning: w });
            const div=document.createElement('div'); div.className='history-item';
            div.innerHTML=`<div style="display:flex;justify-content:space-between"><span style="font-size:0.7rem;color:var(--text-secondary)">${now.toLocaleDateString('ru-RU')} ${now.toLocaleTimeString('ru-RU')}</span><span style="color:${w?'var(--red)':'var(--green)'}">${w?'⚠️':'✅'}</span></div><div style="display:flex;justify-content:space-between;margin-top:2px"><span style="color:var(--green);font-weight:700">${currentTransparency.toFixed(1)}%</span><span style="color:var(--blue);font-size:0.68rem">Пределы: ${calibrationLow!==null?calibrationLow.toFixed(1):'—'} / ${calibrationHigh!==null?calibrationHigh.toFixed(1):'—'}</span></div>`;
            historyList.prepend(div); updateStatistics();
        }
        recordBtn.addEventListener('click', ()=>{ if(!stream && !ipStream) return; addHistoryRecord(); });
        clearHistoryBtn.addEventListener('click', ()=>{ historyList.innerHTML=''; historyRecords=[]; updateStatistics(); });

        snapshotBtn.addEventListener('click', ()=>{ if(!stream && !ipStream) return; const c=document.createElement('canvas'); c.width=video.videoWidth; c.height=video.videoHeight; const ctx=c.getContext('2d'); ctx.drawImage(video,0,0); ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,c.width,60); ctx.fillStyle='#3fb950'; ctx.font='bold 24px sans-serif'; ctx.fillText('Прозрачность: '+currentTransparency.toFixed(1)+'%',20,40); const a=document.createElement('a'); a.download='snap_'+new Date().toISOString().slice(0,19).replace(/:/g,'-')+'.png'; a.href=c.toDataURL('image/png'); a.click(); statusEl.textContent='📸 Снимок сохранён'; });
        exportBtn.addEventListener('click', ()=>{ if(!historyRecords.length) { statusEl.textContent='❌ Нет данных'; return; } let csv='Дата;Время;Прозрачность(%);Яркость;Нижний предел;Верхний предел;Статус\n'; historyRecords.forEach(r=>{ csv+=`${r.date};${r.time};${r.transparency.toFixed(1)};${r.brightness.toFixed(1)};${r.lowLimit!==null?r.lowLimit.toFixed(1):'—'};${r.highLimit!==null?r.highLimit.toFixed(1):'—'};${r.warning?'WARNING':'Норма'}\n`; }); const b=new Blob(['\uFEFF'+csv],{type:'text/csv'}), a=document.createElement('a'); a.download='data_'+new Date().toISOString().slice(0,10)+'.csv'; a.href=URL.createObjectURL(b); a.click(); statusEl.textContent='📊 Экспорт ('+historyRecords.length+' записей)'; });
        autoRecordBtn.addEventListener('click', ()=>{ if(autoRecordTimer) { clearInterval(autoRecordTimer); autoRecordTimer=null; timerRow.style.display='none'; autoRecordBtn.textContent='⏱️ Авто'; return; } const iv=parseInt(timerInterval.value)||5; timerRow.style.display='flex'; autoRecordBtn.textContent='⏸️ Стоп'; autoRecordSeconds=iv; const ci=setInterval(()=>{ autoRecordSeconds--; timerCountdown.textContent=autoRecordSeconds>0?autoRecordSeconds+' сек':'Запись!'; if(autoRecordSeconds<=0) autoRecordSeconds=iv; },1000); autoRecordTimer=setInterval(()=>{ if(!stream && !ipStream) return; addHistoryRecord(); }, iv*1000); stopAutoBtn.onclick=()=>{ clearInterval(autoRecordTimer); clearInterval(ci); autoRecordTimer=null; timerRow.style.display='none'; autoRecordBtn.textContent='⏱️ Авто'; }; });
        videoRecordBtn.addEventListener('click', () => isRecording ? stopVid() : startVid());
        function startVid() { if(!stream && !ipStream) return; recordedChunks=[]; recordingCanvas=document.createElement('canvas'); recordingCanvas.width=video.videoWidth||640; recordingCanvas.height=video.videoHeight||480; recordingCtx=recordingCanvas.getContext('2d'); recordingStream=recordingCanvas.captureStream(30); try { mediaRecorder=new MediaRecorder(recordingStream,{mimeType:'video/webm;codecs=vp9'}); } catch(e) { mediaRecorder=new MediaRecorder(recordingStream,{mimeType:'video/webm'}); } mediaRecorder.ondataavailable=e=>{ if(e.data.size>0) recordedChunks.push(e.data); }; mediaRecorder.onstop=()=>{ const blob=new Blob(recordedChunks,{type:'video/webm'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='video_'+new Date().toISOString().slice(0,19).replace(/:/g,'-')+'.webm'; a.click(); statusEl.textContent='🎥 Видео сохранено'; }; mediaRecorder.start(); isRecording=true; videoRecordBtn.textContent='⏹️ Стоп'; recordIndicator.style.display='block'; statusEl.textContent='🎥 Запись...'; renderFrame(); }
        function stopVid() { if(mediaRecorder&&mediaRecorder.state!=='inactive') mediaRecorder.stop(); isRecording=false; videoRecordBtn.textContent='🎥 Видео'; recordIndicator.style.display='none'; }
        function renderFrame() { if(!isRecording) return; recordingCtx.drawImage(video,0,0,recordingCanvas.width,recordingCanvas.height); recordingCtx.fillStyle='rgba(0,0,0,0.5)'; recordingCtx.fillRect(0,recordingCanvas.height-80,recordingCanvas.width,80); if(trendData.length>=2) { const pts=trendData.slice(-30),w=recordingCanvas.width,h=recordingCanvas.height,xs=w/(pts.length-1); recordingCtx.beginPath(); recordingCtx.strokeStyle='#3fb950'; recordingCtx.lineWidth=2; for(let i=0;i<pts.length;i++) { const x=i*xs, y=h-20-(pts[i].transparency/100)*50; i===0?recordingCtx.moveTo(x,y):recordingCtx.lineTo(x,y); } recordingCtx.stroke(); } recordingCtx.fillStyle='#3fb950'; recordingCtx.font='bold 14px sans-serif'; recordingCtx.fillText(`${currentTransparency.toFixed(1)}%`,10,recordingCanvas.height-55); requestAnimationFrame(renderFrame); }

        autoCalBtn.addEventListener('click', startAutoCalibration);
        soundToggleBtn.addEventListener('click', ()=>{ initAudio(); soundEnabled=!soundEnabled; soundToggleBtn.textContent=soundEnabled?'🔊 Звук':'🔇 Без звука'; soundDot.classList.toggle('muted',!soundEnabled); soundStatusEl.textContent=soundEnabled?'Звук включён':'Звук выключен'; });
        themeToggleBtn.addEventListener('click', toggleTheme);
        connectIpBtn.addEventListener('click', connectToIpCamera);
        disconnectIpBtn.addEventListener('click', disconnectIpCamera);

        function analyzeFrame() {
            if((!stream && !ipStream) || video.readyState < 2) { animationId = requestAnimationFrame(analyzeFrame); return; }
            const c=document.createElement('canvas'); c.width=video.videoWidth; c.height=video.videoHeight;
            const ctx=c.getContext('2d'); ctx.drawImage(video,0,0);
            let img;
            if(analysisRegion) { const rx=Math.max(0,Math.min(analysisRegion.x,c.width-1)), ry=Math.max(0,Math.min(analysisRegion.y,c.height-1)); const rw=Math.max(1,Math.min(analysisRegion.width,c.width-rx)), rh=Math.max(1,Math.min(analysisRegion.height,c.height-ry)); img=ctx.getImageData(rx,ry,rw,rh); }
            else img=ctx.getImageData(0,0,c.width,c.height);
            const data=img.data; let total=0;
            for(let i=0;i<data.length;i+=4) total+=0.299*data[i]+0.587*data[i+1]+0.114*data[i+2];
            currentBrightness=total/(data.length/4);
            if(calibrationLow!==null&&calibrationHigh!==null&&calibrationLow>calibrationHigh) currentTransparency=((currentBrightness-calibrationHigh)/(calibrationLow-calibrationHigh))*100;
            else if(calibrationLow!==null) currentTransparency=(currentBrightness/calibrationLow)*100;
            else currentTransparency=(currentBrightness/255)*100;
            currentTransparency=Math.max(0,Math.min(100,currentTransparency));
            transparencyEl.textContent=currentTransparency.toFixed(1)+'%'; brightnessEl.textContent=currentBrightness.toFixed(1);
            indicatorEl.style.left=currentTransparency+'%'; meterFill.style.width=currentTransparency+'%';
            const th=parseFloat(thresholdInput.value)||30;
            if(currentTransparency<th) { warningMsg.textContent='⚠️ WARNING!'; warningMsg.classList.add('active'); playCalmBeep(); }
            else { warningMsg.textContent=''; warningMsg.classList.remove('active'); }
            addTrendPoint(currentTransparency);
            animationId=requestAnimationFrame(analyzeFrame);
        }
        function startAnalysis() { if(animationId) cancelAnimationFrame(animationId); analyzeFrame(); }

        document.addEventListener('click', initAudio, { once: true });
        document.addEventListener('touchstart', initAudio, { once: true });

        window.addEventListener('load', ()=>{ if(!navigator.mediaDevices?.getUserMedia) { statusEl.textContent='❌ Нет камеры'; return; } startCamera(); });
        window.addEventListener('beforeunload', ()=>{ if(stream) stream.getTracks().forEach(t=>t.stop()); if(ipStream) ipStream.getTracks().forEach(t=>t.stop()); if(autoRecordTimer) clearInterval(autoRecordTimer); if(autoCalibration.active) stopAutoCalibration(); if(isRecording) stopVid(); });
    </script>
</body>
</html>
