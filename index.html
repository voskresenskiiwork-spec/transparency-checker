<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Прозрачность жидкости</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            padding: 20px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #2c3e50; }
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin: 15px 0;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .region-selector {
            position: absolute;
            border: 2px dashed #f1c40f;
            background: rgba(241, 196, 15, 0.15);
            pointer-events: none;
            display: none;
            z-index: 5;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
        }
        button {
            flex: 1 1 auto;
            min-width: 100px;
            padding: 14px 10px;
            border: none;
            border-radius: 14px;
            background: #3498db;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            touch-action: manipulation;
        }
        button:active { transform: scale(0.96); }
        button:disabled { background: #bdc3c7; transform: none; }
        .result-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 15px;
            margin-top: 10px;
        }
        .meter {
            width: 100%;
            height: 24px;
            background: linear-gradient(to right, #fff, #2c3e50);
            border-radius: 12px;
            margin: 12px 0;
            position: relative;
            overflow: hidden;
            border: 1px solid #ddd;
        }
        .indicator {
            position: absolute;
            top: -3px;
            width: 5px;
            height: 30px;
            background: #e74c3c;
            border-radius: 3px;
            transition: left 0.15s;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            font-size: 1rem;
            margin: 10px 0;
        }
        .value {
            font-weight: 700;
            font-size: 1.3rem;
            color: #2c3e50;
        }
        #statusText {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-top: 8px;
            min-height: 1.2em;
        }
        .warning {
            color: #e74c3c;
            background: #fdecea;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.9rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💧 Прозрачность жидкости</h1>
        <div class="video-wrapper" id="videoWrapper">
            <video id="video" autoplay playsinline muted></video>
            <div id="regionSelector" class="region-selector"></div>
        </div>
        <div class="controls">
            <button id="areaBtn" disabled>🎯 Выбрать область</button>
            <button id="resetBtn" disabled>🔄 Сброс</button>
        </div>
        <div class="result-card">
            <div class="stats">
                <span>Прозрачность <span class="value" id="transparencyValue">0%</span></span>
                <span>Яркость <span class="value" id="brightnessValue">0</span></span>
            </div>
            <div class="meter">
                <div class="indicator" id="indicator" style="left: 0%;"></div>
            </div>
            <div id="statusText">Загрузка...</div>
        </div>
        <div id="httpsWarning" class="warning" style="display: none;">
            ⚠️ <strong>Внимание!</strong> Для доступа к камере страница должна быть открыта по протоколу <strong>HTTPS</strong>.<br>
            Текущий протокол: <span id="currentProtocol"></span><br>
            Загрузите эту страницу через безопасное соединение (см. инструкцию).
        </div>
    </div>

    <script>
        // Проверка HTTPS
        if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') {
            document.getElementById('httpsWarning').style.display = 'block';
            document.getElementById('currentProtocol').textContent = window.location.protocol + '//';
            document.getElementById('statusText').textContent = '❌ Камера недоступна (не HTTPS)';
        } else {
            document.getElementById('httpsWarning').style.display = 'none';
        }

        const video = document.getElementById('video');
        const areaBtn = document.getElementById('areaBtn');
        const resetBtn = document.getElementById('resetBtn');
        const transparencyEl = document.getElementById('transparencyValue');
        const brightnessEl = document.getElementById('brightnessValue');
        const indicatorEl = document.getElementById('indicator');
        const statusEl = document.getElementById('statusText');
        const regionSelector = document.getElementById('regionSelector');

        let stream = null;
        let analysisRegion = null;
        let isSelecting = false;
        let animationId = null;

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { ideal: 'environment' },
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    },
                    audio: false
                });
            } catch (e) {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: true,
                        audio: false
                    });
                } catch (err) {
                    statusEl.innerHTML = '<span style="color:#e74c3c;">❌ Нет доступа к камере. Разрешите использование камеры и перезагрузите.</span>';
                    return;
                }
            }

            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                statusEl.textContent = '✅ Камера работает. Выберите область для анализа.';
                areaBtn.disabled = false;
                resetBtn.disabled = true;
                startAnalysis();
            };
        }

        function getCoords(e) {
            const rect = video.getBoundingClientRect();
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return {
                x: clientX - rect.left,
                y: clientY - rect.top,
                rectWidth: rect.width,
                rectHeight: rect.height
            };
        }

        let startX, startY;
        function onPointerDown(e) {
            if (!isSelecting) return;
            e.preventDefault();
            const { x, y } = getCoords(e);
            startX = x;
            startY = y;
            regionSelector.style.display = 'block';
            regionSelector.style.left = x + 'px';
            regionSelector.style.top = y + 'px';
            regionSelector.style.width = '0px';
            regionSelector.style.height = '0px';
        }
        function onPointerMove(e) {
            if (!isSelecting || startX === undefined) return;
            e.preventDefault();
            const { x, y } = getCoords(e);
            const left = Math.min(startX, x);
            const top = Math.min(startY, y);
            const width = Math.abs(x - startX);
            const height = Math.abs(y - startY);
            regionSelector.style.left = left + 'px';
            regionSelector.style.top = top + 'px';
            regionSelector.style.width = width + 'px';
            regionSelector.style.height = height + 'px';
        }
        function onPointerUp(e) {
            if (!isSelecting || startX === undefined) return;
            e.preventDefault();
            const { x, y, rectWidth, rectHeight } = getCoords(e);
            const scaleX = video.videoWidth / rectWidth;
            const scaleY = video.videoHeight / rectHeight;
            analysisRegion = {
                x: Math.min(startX, x) * scaleX,
                y: Math.min(startY, y) * scaleY,
                width: Math.abs(x - startX) * scaleX,
                height: Math.abs(y - startY) * scaleY
            };
            isSelecting = false;
            areaBtn.textContent = '🎯 Выбрать область';
            areaBtn.style.background = '#3498db';
            resetBtn.disabled = false;
            statusEl.textContent = '✅ Область выбрана. Идёт анализ...';
            removeSelectionListeners();
        }
        function addSelectionListeners() {
            video.addEventListener('mousedown', onPointerDown);
            video.addEventListener('mousemove', onPointerMove);
            video.addEventListener('mouseup', onPointerUp);
            video.addEventListener('touchstart', onPointerDown, { passive: false });
            video.addEventListener('touchmove', onPointerMove, { passive: false });
            video.addEventListener('touchend', onPointerUp);
        }
        function removeSelectionListeners() {
            video.removeEventListener('mousedown', onPointerDown);
            video.removeEventListener('mousemove', onPointerMove);
            video.removeEventListener('mouseup', onPointerUp);
            video.removeEventListener('touchstart', onPointerDown);
            video.removeEventListener('touchmove', onPointerMove);
            video.removeEventListener('touchend', onPointerUp);
        }

        areaBtn.addEventListener('click', () => {
            if (isSelecting) {
                isSelecting = false;
                areaBtn.textContent = '🎯 Выбрать область';
                areaBtn.style.background = '#3498db';
                regionSelector.style.display = 'none';
                statusEl.textContent = 'Выбор области отменён.';
                removeSelectionListeners();
                return;
            }
            if (!stream) {
                alert('Камера ещё не готова.');
                return;
            }
            isSelecting = true;
            areaBtn.textContent = '✋ Отменить';
            areaBtn.style.background = '#e67e22';
            statusEl.textContent = 'Выделите область пальцем или мышью';
            startX = undefined;
            startY = undefined;
            addSelectionListeners();
        });

        resetBtn.addEventListener('click', () => {
            analysisRegion = null;
            regionSelector.style.display = 'none';
            resetBtn.disabled = true;
            statusEl.textContent = '🔄 Область сброшена. Анализ по всему кадру.';
        });

        function analyzeFrame() {
            if (!stream || video.readyState < 2) {
                animationId = requestAnimationFrame(analyzeFrame);
                return;
            }
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            let imageData;
            if (analysisRegion) {
                const rx = Math.max(0, Math.min(analysisRegion.x, canvas.width - 1));
                const ry = Math.max(0, Math.min(analysisRegion.y, canvas.height - 1));
                const rw = Math.max(1, Math.min(analysisRegion.width, canvas.width - rx));
                const rh = Math.max(1, Math.min(analysisRegion.height, canvas.height - ry));
                imageData = ctx.getImageData(rx, ry, rw, rh);
            } else {
                imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            }
            const data = imageData.data;
            let totalBrightness = 0;
            const pixelCount = data.length / 4;
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                totalBrightness += 0.299 * r + 0.587 * g + 0.114 * b;
            }
            const avgBrightness = totalBrightness / pixelCount;
            const transparency = Math.min(100, Math.max(0, (avgBrightness / 255) * 100));
            transparencyEl.textContent = transparency.toFixed(1) + '%';
            brightnessEl.textContent = avgBrightness.toFixed(1);
            indicatorEl.style.left = transparency + '%';
            let quality = '';
            if (transparency > 90) quality = '💧 Очень прозрачная';
            else if (transparency > 70) quality = '💧 Прозрачная';
            else if (transparency > 50) quality = '🌫️ Средняя мутность';
            else if (transparency > 30) quality = '🌫️ Мутная';
            else quality = '⬛ Очень мутная';
            statusEl.textContent = quality;
            animationId = requestAnimationFrame(analyzeFrame);
        }

        function startAnalysis() {
            if (animationId) cancelAnimationFrame(animationId);
            analyzeFrame();
        }

        window.addEventListener('load', () => {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                statusEl.innerHTML = '<span style="color:#e74c3c;">❌ Браузер не поддерживает камеру.</span>';
                return;
            }
            // Запуск камеры только если протокол https или localhost
            if (window.location.protocol === 'https:' || window.location.hostname === 'localhost') {
                startCamera();
            } else {
                statusEl.textContent = '⛔ Откройте страницу через HTTPS';
            }
        });

        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
