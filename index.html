<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Прозрачность жидкости</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            width: 100%;
            max-width: 550px;
            background: white;
            border-radius: 20px;
            padding: 20px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            position: relative;
        }
        #datetime {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 0.85rem;
            color: #666;
            background: rgba(0,0,0,0.05);
            padding: 4px 10px;
            border-radius: 8px;
            z-index: 10;
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.3rem; color: #2c3e50; }
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin: 15px 0;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .region-selector {
            position: absolute;
            border: 2px dashed #f1c40f;
            background: rgba(241, 196, 15, 0.15);
            pointer-events: none;
            display: none;
            z-index: 5;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 10px 0;
        }
        button {
            flex: 1 1 auto;
            min-width: 80px;
            padding: 10px 8px;
            border: none;
            border-radius: 12px;
            background: #3498db;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            touch-action: manipulation;
        }
        button:active { transform: scale(0.96); }
        button:disabled { background: #bdc3c7; transform: none; }
        .calibrate-btn { background: #27ae60; }
        .record-btn { background: #f39c12; }
        .broadcast-btn { background: #8e44ad; }
        .threshold-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .threshold-row input {
            width: 70px;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1rem;
            text-align: center;
        }
        .warning-text {
            color: #e74c3c;
            font-weight: bold;
            font-size: 1.2rem;
            margin: 5px 0;
            min-height: 1.5em;
        }
        .result-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 15px;
            margin-top: 10px;
        }
        .meter {
            width: 100%;
            height: 24px;
            background: linear-gradient(to right, #fff, #2c3e50);
            border-radius: 12px;
            margin: 12px 0;
            position: relative;
            overflow: hidden;
            border: 1px solid #ddd;
        }
        .indicator {
            position: absolute;
            top: -3px;
            width: 5px;
            height: 30px;
            background: #e74c3c;
            border-radius: 3px;
            transition: left 0.15s;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            font-size: 1rem;
            margin: 5px 0;
        }
        .value { font-weight: 700; font-size: 1.3rem; color: #2c3e50; }
        #statusText { font-size: 0.9rem; color: #7f8c8d; margin-top: 5px; min-height: 1.2em; }
        .history {
            margin-top: 15px;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
        .history h3 { margin-bottom: 5px; color: #2c3e50; }
        .history-item {
            font-size: 0.8rem;
            padding: 4px 6px;
            background: #fff;
            border-radius: 6px;
            margin-bottom: 3px;
            display: flex;
            justify-content: space-between;
        }
        .history-item span { font-weight: 600; }
        .clear-history {
            font-size: 0.75rem;
            color: #e74c3c;
            cursor: pointer;
            text-decoration: underline;
            background: none;
            border: none;
            padding: 0;
            margin-top: 4px;
        }
        .trend-canvas {
            width: 100%;
            height: 150px;
            background: #fff;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-top: 10px;
        }
        .peer-connect {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }
        .peer-connect input {
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            width: 200px;
            font-size: 0.9rem;
        }
        .peer-id-display {
            font-weight: bold;
            word-break: break-all;
            background: #f0f0f0;
            padding: 4px 8px;
            border-radius: 6px;
            margin: 5px 0;
        }
        .peer-status {
            font-size: 0.8rem;
            margin-top: 4px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="datetime"></div>
        <h1>💧 Прозрачность жидкости</h1>

        <div class="video-wrapper" id="videoWrapper">
            <video id="video" autoplay playsinline muted></video>
            <div id="regionSelector" class="region-selector"></div>
        </div>

        <div class="controls">
            <button id="areaBtn" disabled>🎯 Область</button>
            <button id="resetBtn" disabled>🔄 Сброс</button>
            <button id="calibrateBtn" class="calibrate-btn" disabled>📏 Калибровать</button>
            <button id="recordBtn" class="record-btn" disabled>📝 Записать</button>
            <button id="broadcastBtn" class="broadcast-btn" disabled>📡 Трансляция</button>
        </div>

        <div class="threshold-row">
            <label for="threshold">Порог (0-100%):</label>
            <input type="number" id="threshold" value="70" min="0" max="100" step="1">
        </div>
        <div id="warningMessage" class="warning-text"></div>

        <div class="result-card">
            <div class="stats">
                <span>Прозрачность <span class="value" id="transparencyValue">0%</span></span>
                <span>Яркость <span class="value" id="brightnessValue">0</span></span>
            </div>
            <div class="meter">
                <div class="indicator" id="indicator" style="left: 0%;"></div>
            </div>
            <div id="statusText">Загрузка камеры...</div>
        </div>

        <canvas id="trendCanvas" class="trend-canvas" width="500" height="150"></canvas>

        <!-- Блок трансляции -->
        <div style="margin-top: 10px;">
            <div><strong>Ваш ID для трансляции:</strong> <span id="myPeerId">—</span></div>
            <div id="peerStatus" class="peer-status">Сервер PeerJS не подключён</div>
        </div>
        <div class="peer-connect">
            <input type="text" id="remotePeerId" placeholder="ID для подключения">
            <button id="connectBtn">🔗 Подключиться</button>
            <button id="disconnectBtn" style="display:none;">❌ Отключиться</button>
        </div>

        <div class="history" id="historyContainer">
            <h3>📋 История измерений</h3>
            <div id="historyList"></div>
            <button class="clear-history" id="clearHistoryBtn">Очистить историю</button>
        </div>
    </div>

    <script>
               // DOM элементы
        const video = document.getElementById('video');
        const areaBtn = document.getElementById('areaBtn');
        const resetBtn = document.getElementById('resetBtn');
        const calibrateBtn = document.getElementById('calibrateBtn');
        const recordBtn = document.getElementById('recordBtn');
        const broadcastBtn = document.getElementById('broadcastBtn');
        const transparencyEl = document.getElementById('transparencyValue');
        const brightnessEl = document.getElementById('brightnessValue');
        const indicatorEl = document.getElementById('indicator');
        const statusEl = document.getElementById('statusText');
        const regionSelector = document.getElementById('regionSelector');
        const thresholdInput = document.getElementById('threshold');
        const warningMsg = document.getElementById('warningMessage');
        const datetimeEl = document.getElementById('datetime');
        const historyList = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const trendCanvas = document.getElementById('trendCanvas');
        const ctxTrend = trendCanvas.getContext('2d');
        const remotePeerIdInput = document.getElementById('remotePeerId');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const myPeerIdSpan = document.getElementById('myPeerId');
        const peerStatusSpan = document.getElementById('peerStatus');

        let stream = null;
        let analysisRegion = null;
        let isSelecting = false;
        let animationId = null;
        let calibrationBrightness = null;
        let currentTransparency = 0;
        let currentBrightness = 0;
        let trendData = [];
        let peer = null;
        let remoteConnection = null;
        let dataChannel = null;
        let isBroadcasting = false;
        let isReceiving = false;

        // ... функции updateDateTime, drawTrend, addTrendPoint, startCamera,
        // выбор области, калибровка, история, analyzeFrame, startAnalysis
        // (они остаются без изменений, поэтому я их пропускаю для краткости,
        // но в реальном коде они должны присутствовать полностью)

        // ====== PeerJS с улучшенной обработкой ======
        function initPeer() {
            // Закрываем предыдущий экземпляр если есть
            if (peer) {
                peer.destroy();
                peer = null;
            }

            // Можно использовать свой сигнальный сервер, если стандартный недоступен
            // const customServer = { host: 'your-server.com', port: 9000, path: '/myapp' };
            // peer = new Peer(undefined, { host: customServer.host, port: customServer.port, path: customServer.path });
            
            peer = new Peer(); // Используем сервер по умолчанию 0.peerjs.com

            peer.on('open', (id) => {
                myPeerIdSpan.textContent = id;
                myPeerIdSpan.style.color = '#27ae60';
                peerStatusSpan.textContent = '✅ Сервер PeerJS подключён, ваш ID готов';
                console.log('Peer ID:', id);
            });

            peer.on('disconnected', () => {
                peerStatusSpan.textContent = '⚠️ Соединение с сервером потеряно, переподключение...';
                peer.reconnect();
            });

            peer.on('error', (err) => {
                console.error('PeerJS error:', err);
                myPeerIdSpan.textContent = 'Ошибка';
                myPeerIdSpan.style.color = '#e74c3c';
                if (err.type === 'unavailable-id') {
                    peerStatusSpan.textContent = '❌ Этот ID уже используется. Попробуйте обновить страницу.';
                } else if (err.type === 'network') {
                    peerStatusSpan.textContent = '❌ Проблема сети или сервер недоступен. Проверьте интернет.';
                } else if (err.type === 'server-error') {
                    peerStatusSpan.textContent = '❌ Ошибка сервера PeerJS. Попробуйте позже или используйте другой сервер.';
                } else {
                    peerStatusSpan.textContent = '❌ Ошибка: ' + err.message;
                }
                broadcastBtn.disabled = false;
                broadcastBtn.textContent = '📡 Трансляция';
                isBroadcasting = false;
            });

            peer.on('connection', (conn) => {
                if (isBroadcasting) {
                    conn.on('open', () => {
                        // Отправляем видео звонком
                        const call = peer.call(conn.peer, stream);
                        call.on('stream', (remoteStream) => {
                            // не требуется
                        });
                        call.on('error', (err) => {
                            statusEl.textContent = '❌ Ошибка передачи видео: ' + err;
                        });
                        dataChannel = conn; // DataConnection для команд
                        dataChannel.on('data', (data) => {
                            // можем получать что-то от наблюдателя
                        });
                        peerStatusSpan.textContent = '🔗 Наблюдатель подключён, идёт трансляция';
                    });
                }
            });

            peer.on('call', (call) => {
                if (!isBroadcasting && !isReceiving) {
                    // Мы подключаемся к чужой трансляции? У нас уже есть connectBtn логика.
                    // На всякий случай обработаем входящий звонок, если нас вызвали как наблюдателя.
                    call.answer(); // без своего потока
                    call.on('stream', (remoteStream) => {
                        video.srcObject = remoteStream;
                        isReceiving = true;
                        statusEl.textContent = '📡 Получен удалённый видеопоток';
                        areaBtn.disabled = true;
                        calibrateBtn.disabled = true;
                        broadcastBtn.disabled = true;
                        // ждём dataChannel от звонящего (обычно созванивающийся создаёт DataConnection отдельно)
                    });
                    call.on('error', (err) => {
                        statusEl.textContent = '❌ Ошибка входящего звонка: ' + err;
                    });
                }
            });
        }

        // Кнопка "Трансляция"
        broadcastBtn.addEventListener('click', () => {
            if (isBroadcasting) {
                // Отключаем трансляцию
                if (dataChannel) dataChannel.close();
                if (peer) {
                    peer.destroy();
                    peer = null;
                }
                isBroadcasting = false;
                broadcastBtn.textContent = '📡 Трансляция';
                broadcastBtn.disabled = false;
                myPeerIdSpan.textContent = '—';
                peerStatusSpan.textContent = 'Сервер PeerJS не подключён';
                statusEl.textContent = 'Трансляция остановлена.';
                return;
            }
            if (!stream) {
                alert('Сначала включите камеру');
                return;
            }
            initPeer();
            isBroadcasting = true;
            broadcastBtn.textContent = '⏹️ Остановить трансляцию';
            broadcastBtn.disabled = false;
            statusEl.textContent = 'Ожидание подключения... Передайте ваш ID другому устройству.';
            peerStatusSpan.textContent = '⏳ Подключение к серверу...';
        });

        // Подключение к удалённому ID
        connectBtn.addEventListener('click', () => {
            const remoteId = remotePeerIdInput.value.trim();
            if (!remoteId) return;
            if (!peer) initPeer();

            remoteConnection = peer.connect(remoteId);
            remoteConnection.on('open', () => {
                dataChannel = remoteConnection;
                statusEl.textContent = '🔗 Data-канал открыт. Запрашиваем видео...';
                // Запрашиваем видео
                const call = peer.call(remoteId, stream);
                call.on('stream', (remoteStream) => {
                    video.srcObject = remoteStream;
                    isReceiving = true;
                    statusEl.textContent = '📡 Видео получено';
                    areaBtn.disabled = true;
                    calibrateBtn.disabled = true;
                    broadcastBtn.disabled = true;
                });
                call.on('error', (err) => {
                    statusEl.textContent = '❌ Ошибка видеозвонка: ' + err;
                });
                // Получаем данные
                remoteConnection.on('data', (data) => {
                    const parsed = JSON.parse(data);
                    currentTransparency = parsed.transparency;
                    currentBrightness = parsed.brightness;
                    transparencyEl.textContent = currentTransparency.toFixed(1) + '%';
                    brightnessEl.textContent = currentBrightness.toFixed(1);
                    indicatorEl.style.left = currentTransparency + '%';
                    addTrendPoint(currentTransparency);
                    const threshold = parseFloat(thresholdInput.value) || 70;
                    warningMsg.textContent = currentTransparency < threshold ? '⚠️ WARNING: Прозрачность ниже порога!' : '';
                });
                connectBtn.style.display = 'none';
                disconnectBtn.style.display = 'inline-block';
            });
            remoteConnection.on('error', (err) => {
                statusEl.textContent = '❌ Ошибка подключения: ' + err;
            });
        });

        disconnectBtn.addEventListener('click', () => {
            if (remoteConnection) remoteConnection.close();
            if (dataChannel) dataChannel.close();
            if (peer) {
                peer.destroy();
                peer = null;
            }
            video.srcObject = stream;
            isReceiving = false;
            isBroadcasting = false;
            broadcastBtn.disabled = false;
            broadcastBtn.textContent = '📡 Трансляция';
            connectBtn.style.display = 'inline-block';
            disconnectBtn.style.display = 'none';
            dataChannel = null;
            remoteConnection = null;
            myPeerIdSpan.textContent = '—';
            peerStatusSpan.textContent = 'Сервер PeerJS не подключён';
            areaBtn.disabled = false;
            calibrateBtn.disabled = false;
            statusEl.textContent = '🔌 Отключено. Используется локальная камера.';
            startAnalysis();
        });

        // Остальной код (startAnalysis, выбор области и т.д.) без изменений
        // ... (вставьте сюда полную реализацию функций, которые я пропустил)
    </script>
</body>
</html>
