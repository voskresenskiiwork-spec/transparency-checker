<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Прозрачность жидкости</title>
    <style>
        :root {
            --bg: #1a1d23;
            --card: #21252b;
            --surface: #282c34;
            --text: #e1e4e8;
            --text-secondary: #959da5;
            --blue: #58a6ff;
            --green: #3fb950;
            --orange: #f0883e;
            --red: #f85149;
            --purple: #bc8cff;
            --yellow: #d2991d;
            --border: #30363d;
            --shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            width: 100%;
            max-width: 560px;
            background: var(--card);
            border-radius: 24px;
            padding: 24px 18px;
            box-shadow: var(--shadow);
            text-align: center;
            position: relative;
            border: 1px solid var(--border);
        }
        #datetime {
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            background: var(--surface);
            padding: 6px 12px;
            border-radius: 20px;
            z-index: 10;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        h1 { 
            font-size: 1.4rem; 
            margin-bottom: 0.5rem; 
            color: var(--text); 
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin: 16px 0;
            border: 2px solid var(--border);
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
        }
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
        }
        .region-selector {
            position: absolute;
            border: 2px dashed var(--yellow);
            background: rgba(210, 153, 29, 0.2);
            pointer-events: none;
            display: none;
            z-index: 5;
            border-radius: 4px;
        }
        .controls {
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px; 
            justify-content: center; 
            margin: 12px 0;
        }
        button {
            flex: 1 1 auto; 
            min-width: 70px; 
            padding: 12px 8px; 
            border: 1px solid var(--border); 
            border-radius: 14px;
            background: var(--surface); 
            color: var(--text); 
            font-size: 0.82rem; 
            font-weight: 600; 
            cursor: pointer;
            transition: all 0.2s ease; 
            touch-action: manipulation;
            letter-spacing: 0.2px;
        }
        button:active { 
            transform: scale(0.96); 
            opacity: 0.9;
        }
        button:disabled { 
            background: #1c1f26; 
            color: #555; 
            cursor: not-allowed; 
            transform: none; 
            border-color: #222;
        }
        .btn-green { background: #1a3a2a; border-color: var(--green); color: var(--green); }
        .btn-green:hover:not(:disabled) { background: #1f442f; }
        .btn-gray { background: #2a2d35; border-color: #555; color: #bbb; }
        .btn-gray:hover:not(:disabled) { background: #33363e; }
        .btn-orange { background: #3a2a1a; border-color: var(--orange); color: var(--orange); }
        .btn-orange:hover:not(:disabled) { background: #44301e; }
        .btn-red { background: #3a1a1a; border-color: var(--red); color: var(--red); }
        .btn-red:hover:not(:disabled) { background: #441e1e; }
        .btn-blue { background: #1a2a3a; border-color: var(--blue); color: var(--blue); }
        .btn-blue:hover:not(:disabled) { background: #1e3044; }
        .btn-purple { background: #2a1a3a; border-color: var(--purple); color: var(--purple); }
        .btn-purple:hover:not(:disabled) { background: #301e44; }
        
        .sound-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .sound-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s infinite;
        }
        .sound-dot.muted {
            background: var(--red);
            animation: none;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .threshold-row {
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            margin: 12px 0; 
            flex-wrap: wrap;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .threshold-row input {
            width: 65px; 
            padding: 8px 10px; 
            border-radius: 10px; 
            border: 1px solid var(--border); 
            background: var(--surface);
            color: var(--text);
            font-size: 0.95rem; 
            text-align: center;
            font-weight: 600;
        }
        .warning-text {
            color: var(--red); 
            font-weight: 600; 
            font-size: 1.1rem; 
            margin: 8px 0; 
            min-height: 1.5em;
            transition: all 0.3s ease;
        }
        .warning-text.active {
            animation: warningPulse 1.5s ease-in-out infinite;
        }
        @keyframes warningPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .result-card {
            background: var(--surface); 
            border-radius: 18px; 
            padding: 18px; 
            margin-top: 12px;
            border: 1px solid var(--border);
        }
        .meter {
            width: 100%; 
            height: 28px; 
            background: linear-gradient(to right, #1a1a1a, #2a2a2a, #3a3a3a, #e0e0e0);
            border-radius: 14px; 
            margin: 12px 0; 
            position: relative; 
            overflow: hidden; 
            border: 1px solid var(--border);
        }
        .meter-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, #3fb95044, #3fb95088);
            border-radius: 14px 0 0 14px;
            transition: width 0.3s ease;
        }
        .indicator {
            position: absolute; 
            top: -4px; 
            width: 4px; 
            height: 36px; 
            background: var(--text);
            border-radius: 2px; 
            transition: left 0.2s ease;
            box-shadow: 0 0 8px rgba(255,255,255,0.3);
        }
        .stats { 
            display: flex; 
            justify-content: space-around; 
            font-size: 0.95rem; 
            margin: 8px 0;
            color: var(--text-secondary);
        }
        .value { 
            font-weight: 700; 
            font-size: 1.5rem; 
            color: var(--text);
        }
        
        #statusText { 
            font-size: 0.85rem; 
            color: var(--text-secondary); 
            margin-top: 8px; 
            min-height: 1.2em; 
        }
        .history {
            margin-top: 18px; 
            text-align: left; 
            max-height: 160px; 
            overflow-y: auto;
            border-top: 1px solid var(--border); 
            padding-top: 12px;
        }
        .history h3 { 
            margin-bottom: 8px; 
            color: var(--text); 
            font-size: 0.95rem;
        }
        .history-item {
            font-size: 0.78rem; 
            padding: 6px 8px; 
            background: var(--surface); 
            border-radius: 8px;
            margin-bottom: 4px; 
            display: flex; 
            justify-content: space-between;
            color: var(--text-secondary);
            border: 1px solid transparent;
        }
        .history-item:hover {
            border-color: var(--border);
        }
        .clear-history {
            font-size: 0.75rem; 
            color: var(--red); 
            cursor: pointer; 
            text-decoration: none;
            background: none; 
            border: none; 
            padding: 6px 0;
            margin-top: 6px;
            opacity: 0.8;
            transition: opacity 0.2s;
        }
        .clear-history:hover { opacity: 1; }
        .trend-canvas {
            width: 100%; 
            height: 140px; 
            background: var(--surface); 
            border-radius: 14px;
            border: 1px solid var(--border); 
            margin-top: 12px;
        }
        .calibration-info {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin: 8px 0;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .calibration-info span {
            font-weight: 600;
            color: var(--text);
        }
        .cal-badge {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.78rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="datetime"></div>
        <h1>💧 Прозрачность жидкости</h1>
        
        <div class="video-wrapper" id="videoWrapper">
            <video id="video" autoplay playsinline muted></video>
            <div id="regionSelector" class="region-selector"></div>
        </div>
        
        <div class="controls">
            <button id="areaBtn" disabled>🎯 Область</button>
            <button id="resetBtn" class="btn-red" disabled>🔄 Сброс</button>
            <button id="calibrateLowBtn" class="btn-green" disabled>📏 Нижний предел</button>
            <button id="calibrateHighBtn" class="btn-gray" disabled>⬛ Верхний предел</button>
            <button id="recordBtn" class="btn-blue" disabled>📝 Записать</button>
        </div>
        
        <div class="controls">
            <button id="soundToggleBtn" class="btn-purple" disabled>🔊 Звук</button>
        </div>
        <div class="sound-indicator">
            <div class="sound-dot" id="soundDot"></div>
            <span id="soundStatus">Звук включён</span>
        </div>
        
        <div class="calibration-info">
            <span class="cal-badge">Нижний предел (100%): <span id="lowCalValue">—</span></span>
            <span class="cal-badge">Верхний предел (0%): <span id="highCalValue">—</span></span>
        </div>
        
        <div class="threshold-row">
            <label for="threshold">⚠️ Порог WARNING:</label>
            <input type="number" id="threshold" value="30" min="0" max="100" step="1">
            <span>%</span>
        </div>
        
        <div id="warningMessage" class="warning-text"></div>
        
        <div class="result-card">
            <div class="stats">
                <span>Прозрачность <span class="value" id="transparencyValue">0%</span></span>
                <span>Яркость <span class="value" id="brightnessValue">0</span></span>
            </div>
            <div class="meter">
                <div class="meter-fill" id="meterFill" style="width: 0%;"></div>
                <div class="indicator" id="indicator" style="left: 0%;"></div>
            </div>
            <div id="statusText">Загрузка камеры...</div>
        </div>
        
        <canvas id="trendCanvas" class="trend-canvas" width="500" height="140"></canvas>
        
        <div class="history" id="historyContainer">
            <h3>📋 История измерений</h3>
            <div id="historyList"></div>
            <button class="clear-history" id="clearHistoryBtn">Очистить историю</button>
        </div>
    </div>

    <script>
        // DOM элементы
        const video = document.getElementById('video');
        const areaBtn = document.getElementById('areaBtn');
        const resetBtn = document.getElementById('resetBtn');
        const calibrateLowBtn = document.getElementById('calibrateLowBtn');
        const calibrateHighBtn = document.getElementById('calibrateHighBtn');
        const recordBtn = document.getElementById('recordBtn');
        const soundToggleBtn = document.getElementById('soundToggleBtn');
        const transparencyEl = document.getElementById('transparencyValue');
        const brightnessEl = document.getElementById('brightnessValue');
        const indicatorEl = document.getElementById('indicator');
        const meterFill = document.getElementById('meterFill');
        const statusEl = document.getElementById('statusText');
        const regionSelector = document.getElementById('regionSelector');
        const thresholdInput = document.getElementById('threshold');
        const warningMsg = document.getElementById('warningMessage');
        const datetimeEl = document.getElementById('datetime');
        const historyList = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const trendCanvas = document.getElementById('trendCanvas');
        const ctxTrend = trendCanvas.getContext('2d');
        const lowCalValueEl = document.getElementById('lowCalValue');
        const highCalValueEl = document.getElementById('highCalValue');
        const soundDot = document.getElementById('soundDot');
        const soundStatusEl = document.getElementById('soundStatus');

        let stream = null;
        let analysisRegion = null;
        let isSelecting = false;
        let animationId = null;
        let calibrationLow = null;
        let calibrationHigh = null;
        let currentTransparency = 0;
        let currentBrightness = 0;
        let trendData = [];
        let audioCtx = null;
        let soundEnabled = true;
        let lastBeepTime = 0;
        let beepInterval = 2000;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playCalmBeep() {
            if (!soundEnabled || !audioCtx) return;
            const now = Date.now();
            if (now - lastBeepTime < beepInterval) return;
            lastBeepTime = now;
            
            const playTone = (freq, startTime, duration, volume) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, startTime);
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(volume, startTime + 0.05);
                gain.gain.linearRampToValueAtTime(0, startTime + duration);
                osc.start(startTime);
                osc.stop(startTime + duration);
            };
            
            const t = audioCtx.currentTime;
            playTone(440, t, 0.3, 0.08);
            playTone(554, t + 0.2, 0.25, 0.06);
            beepInterval = Math.max(800, 3000 - (currentTransparency * 30));
        }

        function updateDateTime() {
            const now = new Date();
            datetimeEl.textContent = now.toLocaleString('ru-RU', { 
                day: '2-digit', month: '2-digit', year: 'numeric', 
                hour: '2-digit', minute: '2-digit', second: '2-digit' 
            });
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        function updateCalibrationDisplay() {
            lowCalValueEl.textContent = calibrationLow !== null ? calibrationLow.toFixed(1) : '—';
            highCalValueEl.textContent = calibrationHigh !== null ? calibrationHigh.toFixed(1) : '—';
        }

        function drawTrend() {
            ctxTrend.clearRect(0, 0, trendCanvas.width, trendCanvas.height);
            ctxTrend.fillStyle = '#282c34';
            ctxTrend.fillRect(0, 0, trendCanvas.width, trendCanvas.height);
            
            if (trendData.length < 2) return;
            const w = trendCanvas.width, h = trendCanvas.height;
            const points = trendData.slice(-30);
            const xStep = w / (points.length - 1);
            
            ctxTrend.beginPath();
            ctxTrend.moveTo(0, h);
            for (let i = 0; i < points.length; i++) {
                const x = i * xStep;
                const y = h - (points[i].transparency / 100) * h;
                ctxTrend.lineTo(x, y);
            }
            ctxTrend.lineTo(w, h);
            ctxTrend.closePath();
            const gradient = ctxTrend.createLinearGradient(0, 0, 0, h);
            gradient.addColorStop(0, 'rgba(63, 185, 80, 0.3)');
            gradient.addColorStop(1, 'rgba(63, 185, 80, 0)');
            ctxTrend.fillStyle = gradient;
            ctxTrend.fill();
            
            ctxTrend.beginPath();
            ctxTrend.strokeStyle = '#3fb950';
            ctxTrend.lineWidth = 2.5;
            for (let i = 0; i < points.length; i++) {
                const x = i * xStep;
                const y = h - (points[i].transparency / 100) * h;
                if (i === 0) ctxTrend.moveTo(x, y);
                else ctxTrend.lineTo(x, y);
            }
            ctxTrend.stroke();
            
            const threshold = parseFloat(thresholdInput.value) || 30;
            const yThreshold = h - (threshold / 100) * h;
            ctxTrend.beginPath();
            ctxTrend.strokeStyle = '#f85149';
            ctxTrend.lineWidth = 1.5;
            ctxTrend.setLineDash([6, 4]);
            ctxTrend.moveTo(0, yThreshold);
            ctxTrend.lineTo(w, yThreshold);
            ctxTrend.stroke();
            ctxTrend.setLineDash([]);
        }

        function addTrendPoint(transparency) {
            trendData.push({ time: Date.now(), transparency });
            if (trendData.length > 60) trendData.shift();
            drawTrend();
        }

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: 'environment' }, width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
            } catch (e) {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                } catch (err) {
                    statusEl.textContent = '❌ Нет доступа к камере. Разрешите и перезагрузите.';
                    return;
                }
            }
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                statusEl.textContent = '✅ Камера работает. Выберите область и выполните калибровку.';
                areaBtn.disabled = false;
                calibrateLowBtn.disabled = false;
                calibrateHighBtn.disabled = false;
                recordBtn.disabled = false;
                soundToggleBtn.disabled = false;
                startAnalysis();
            };
        }

        function getCoords(e) {
            const rect = video.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top,
                rectWidth: rect.width,
                rectHeight: rect.height
            };
        }
        let startX, startY;
        function onPointerDown(e) {
            if (!isSelecting) return;
            e.preventDefault();
            const { x, y } = getCoords(e);
            startX = x; startY = y;
            regionSelector.style.display = 'block';
            regionSelector.style.left = x + 'px';
            regionSelector.style.top = y + 'px';
            regionSelector.style.width = '0px';
            regionSelector.style.height = '0px';
        }
        function onPointerMove(e) {
            if (!isSelecting || startX === undefined) return;
            e.preventDefault();
            const { x, y } = getCoords(e);
            regionSelector.style.left = Math.min(startX, x) + 'px';
            regionSelector.style.top = Math.min(startY, y) + 'px';
            regionSelector.style.width = Math.abs(x - startX) + 'px';
            regionSelector.style.height = Math.abs(y - startY) + 'px';
        }
        function onPointerUp(e) {
            if (!isSelecting || startX === undefined) return;
            e.preventDefault();
            const { x, y, rectWidth, rectHeight } = getCoords(e);
            const scaleX = video.videoWidth / rectWidth;
            const scaleY = video.videoHeight / rectHeight;
            analysisRegion = {
                x: Math.min(startX, x) * scaleX,
                y: Math.min(startY, y) * scaleY,
                width: Math.abs(x - startX) * scaleX,
                height: Math.abs(y - startY) * scaleY
            };
            isSelecting = false;
            areaBtn.textContent = '🎯 Область';
            removeSelectionListeners();
        }
        function addSelectionListeners() {
            video.addEventListener('mousedown', onPointerDown);
            video.addEventListener('mousemove', onPointerMove);
            video.addEventListener('mouseup', onPointerUp);
            video.addEventListener('touchstart', onPointerDown, { passive: false });
            video.addEventListener('touchmove', onPointerMove, { passive: false });
            video.addEventListener('touchend', onPointerUp);
        }
        function removeSelectionListeners() {
            video.removeEventListener('mousedown', onPointerDown);
            video.removeEventListener('mousemove', onPointerMove);
            video.removeEventListener('mouseup', onPointerUp);
            video.removeEventListener('touchstart', onPointerDown);
            video.removeEventListener('touchmove', onPointerMove);
            video.removeEventListener('touchend', onPointerUp);
        }

        areaBtn.addEventListener('click', () => {
            if (isSelecting) {
                isSelecting = false;
                areaBtn.textContent = '🎯 Область';
                regionSelector.style.display = 'none';
                removeSelectionListeners();
                return;
            }
            if (!stream) return;
            isSelecting = true;
            areaBtn.textContent = '✋ Отменить';
            addSelectionListeners();
        });

        // Кнопка "Сброс" — сбрасывает и область, и калибровку
        resetBtn.addEventListener('click', () => {
            analysisRegion = null;
            regionSelector.style.display = 'none';
            calibrationLow = null;
            calibrationHigh = null;
            updateCalibrationDisplay();
            statusEl.textContent = '🔄 Всё сброшено: область анализа и калибровка.';
        });

        // Калибровка: нижний предел (100%)
        calibrateLowBtn.addEventListener('click', () => {
            if (!stream) return;
            initAudio();
            calibrationLow = currentBrightness;
            updateCalibrationDisplay();
            statusEl.textContent = `📏 Нижний предел (100%): ${calibrationLow.toFixed(1)}`;
            if (calibrationHigh !== null && calibrationHigh >= calibrationLow) {
                statusEl.textContent += ' ⚠️ Верхний предел ярче нижнего! Сбросьте верхний предел.';
            }
        });

        // Калибровка: верхний предел (0%)
        calibrateHighBtn.addEventListener('click', () => {
            if (!stream) return;
            initAudio();
            if (calibrationLow !== null && currentBrightness >= calibrationLow) {
                statusEl.textContent = '❌ Верхний предел не может быть ярче нижнего! Сделайте жидкость темнее.';
                return;
            }
            calibrationHigh = currentBrightness;
            updateCalibrationDisplay();
            statusEl.textContent = `⬛ Верхний предел (0%): ${calibrationHigh.toFixed(1)}`;
        });

        function addHistoryRecord() {
            const now = new Date();
            const threshold = parseFloat(thresholdInput.value) || 30;
            const warning = currentTransparency < threshold ? '⚠️' : '✅';
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>${now.toLocaleTimeString('ru-RU')}</span> <span style="color:#3fb950">${currentTransparency.toFixed(1)}%</span> <span>${warning}</span>`;
            historyList.prepend(div);
        }
        recordBtn.addEventListener('click', () => {
            if (!stream) return;
            addHistoryRecord();
        });
        clearHistoryBtn.addEventListener('click', () => historyList.innerHTML = '');

        soundToggleBtn.addEventListener('click', () => {
            initAudio();
            soundEnabled = !soundEnabled;
            if (soundEnabled) {
                soundToggleBtn.textContent = '🔊 Звук';
                soundDot.classList.remove('muted');
                soundStatusEl.textContent = 'Звук включён';
            } else {
                soundToggleBtn.textContent = '🔇 Без звука';
                soundDot.classList.add('muted');
                soundStatusEl.textContent = 'Звук выключен';
            }
        });

        function analyzeFrame() {
            if (!stream || video.readyState < 2) {
                animationId = requestAnimationFrame(analyzeFrame);
                return;
            }
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);

            let imageData;
            if (analysisRegion) {
                const rx = Math.max(0, Math.min(analysisRegion.x, canvas.width - 1));
                const ry = Math.max(0, Math.min(analysisRegion.y, canvas.height - 1));
                const rw = Math.max(1, Math.min(analysisRegion.width, canvas.width - rx));
                const rh = Math.max(1, Math.min(analysisRegion.height, canvas.height - ry));
                imageData = ctx.getImageData(rx, ry, rw, rh);
            } else {
                imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            }

            const data = imageData.data;
            let totalBrightness = 0;
            for (let i = 0; i < data.length; i += 4) {
                totalBrightness += 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
            }
            currentBrightness = totalBrightness / (data.length / 4);
            
            if (calibrationLow !== null && calibrationHigh !== null && calibrationLow > calibrationHigh) {
                currentTransparency = ((currentBrightness - calibrationHigh) / (calibrationLow - calibrationHigh)) * 100;
            } else if (calibrationLow !== null) {
                currentTransparency = (currentBrightness / calibrationLow) * 100;
            } else {
                currentTransparency = (currentBrightness / 255) * 100;
            }
            currentTransparency = Math.max(0, Math.min(100, currentTransparency));

            transparencyEl.textContent = currentTransparency.toFixed(1) + '%';
            brightnessEl.textContent = currentBrightness.toFixed(1);
            indicatorEl.style.left = currentTransparency + '%';
            meterFill.style.width = currentTransparency + '%';

            const threshold = parseFloat(thresholdInput.value) || 30;
            const isBelowThreshold = currentTransparency < threshold;
            
            if (isBelowThreshold) {
                warningMsg.textContent = '⚠️ WARNING: Прозрачность ниже порога!';
                warningMsg.classList.add('active');
                playCalmBeep();
            } else {
                warningMsg.textContent = '';
                warningMsg.classList.remove('active');
            }

            addTrendPoint(currentTransparency);
            animationId = requestAnimationFrame(analyzeFrame);
        }

        function startAnalysis() {
            if (animationId) cancelAnimationFrame(animationId);
            analyzeFrame();
        }

        window.addEventListener('load', () => {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                statusEl.textContent = '❌ Браузер не поддерживает камеру.';
                return;
            }
            startCamera();
        });

        window.addEventListener('beforeunload', () => {
            if (stream) stream.getTracks().forEach(track => track.stop());
        });
    </script>
</body>
</html>
