<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Прозрачность жидкости</title>
    <style>
        :root {
            --bg: #1a1d23;
            --card: #21252b;
            --surface: #282c34;
            --text: #e1e4e8;
            --text-secondary: #959da5;
            --blue: #58a6ff;
            --green: #3fb950;
            --orange: #f0883e;
            --red: #f85149;
            --purple: #bc8cff;
            --yellow: #d2991d;
            --border: #30363d;
            --shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            width: 100%;
            max-width: 560px;
            background: var(--card);
            border-radius: 24px;
            padding: 20px 16px;
            box-shadow: var(--shadow);
            text-align: center;
            border: 1px solid var(--border);
        }
        
        .header {
            margin-bottom: 12px;
        }
        h1 { 
            font-size: 1.4rem; 
            color: var(--text); 
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 2px;
        }
        #datetime {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin: 12px 0;
            border: 2px solid var(--border);
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
        }
        video { width: 100%; height: 100%; object-fit: cover; display: block; }
        .region-selector {
            position: absolute;
            border: 2px dashed var(--yellow);
            background: rgba(210, 153, 29, 0.2);
            pointer-events: none;
            display: none;
            z-index: 5;
            border-radius: 4px;
        }
        
        .controls {
            display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 8px 0;
        }
        button {
            flex: 1 1 auto; min-width: 65px; padding: 10px 6px; border: 1px solid var(--border); 
            border-radius: 12px; background: var(--surface); color: var(--text); font-size: 0.78rem; 
            font-weight: 600; cursor: pointer; transition: all 0.2s ease; touch-action: manipulation;
        }
        button:active { transform: scale(0.96); opacity: 0.9; }
        button:disabled { background: #1c1f26; color: #555; cursor: not-allowed; transform: none; border-color: #222; }
        .btn-green { background: #1a3a2a; border-color: var(--green); color: var(--green); }
        .btn-gray { background: #2a2d35; border-color: #555; color: #bbb; }
        .btn-red { background: #3a1a1a; border-color: var(--red); color: var(--red); }
        .btn-blue { background: #1a2a3a; border-color: var(--blue); color: var(--blue); }
        .btn-purple { background: #2a1a3a; border-color: var(--purple); color: var(--purple); }
        
        .sound-indicator {
            display: inline-flex; align-items: center; gap: 6px; font-size: 0.7rem;
            color: var(--text-secondary); margin: 2px 0 6px;
        }
        .sound-dot {
            width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite;
        }
        .sound-dot.muted { background: var(--red); animation: none; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .calibration-inputs {
            display: flex; gap: 10px; justify-content: center; align-items: center;
            margin: 8px 0; flex-wrap: wrap; font-size: 0.78rem; color: var(--text-secondary);
        }
        .calibration-inputs input {
            width: 75px; padding: 6px 8px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text); font-size: 0.85rem; text-align: center; font-weight: 500;
        }
        .calibration-inputs label { margin-right: 4px; }
        
        .threshold-row {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin: 8px 0; flex-wrap: wrap; color: var(--text-secondary); font-size: 0.8rem;
        }
        .threshold-row input {
            width: 60px; padding: 6px 8px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text); font-size: 0.85rem; text-align: center; font-weight: 600;
        }
        
        .warning-text {
            color: var(--red); font-weight: 600; font-size: 1rem; margin: 6px 0; min-height: 1.3em;
        }
        .warning-text.active { animation: warningPulse 1.5s ease-in-out infinite; }
        @keyframes warningPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        
        .result-card {
            background: var(--surface); border-radius: 16px; padding: 14px; margin-top: 8px;
            border: 1px solid var(--border);
        }
        .meter {
            width: 100%; height: 24px; background: linear-gradient(to right, #1a1a1a, #2a2a2a, #3a3a3a, #e0e0e0);
            border-radius: 12px; margin: 10px 0; position: relative; overflow: hidden; border: 1px solid var(--border);
        }
        .meter-fill {
            position: absolute; top: 0; left: 0; height: 100%;
            background: linear-gradient(90deg, #3fb95044, #3fb95088);
            border-radius: 12px 0 0 12px; transition: width 0.3s ease;
        }
        .indicator {
            position: absolute; top: -3px; width: 4px; height: 30px; background: var(--text);
            border-radius: 2px; transition: left 0.2s ease; box-shadow: 0 0 8px rgba(255,255,255,0.3);
        }
        .stats { display: flex; justify-content: space-around; font-size: 0.9rem; margin: 6px 0; color: var(--text-secondary); }
        .value { font-weight: 700; font-size: 1.4rem; color: var(--text); }
        #statusText { font-size: 0.8rem; color: var(--text-secondary); margin-top: 6px; min-height: 1.1em; }
        
        .history {
            margin-top: 14px; text-align: left; max-height: 140px; overflow-y: auto;
            border-top: 1px solid var(--border); padding-top: 10px;
        }
        .history h3 { margin-bottom: 6px; color: var(--text); font-size: 0.9rem; }
        .history-item {
            font-size: 0.75rem; padding: 5px 7px; background: var(--surface); border-radius: 7px;
            margin-bottom: 3px; display: flex; justify-content: space-between;
            color: var(--text-secondary); border: 1px solid transparent;
        }
        .clear-history {
            font-size: 0.7rem; color: var(--red); cursor: pointer; background: none; border: none;
            padding: 4px 0; margin-top: 4px; opacity: 0.8;
        }
        .trend-canvas {
            width: 100%; height: 130px; background: var(--surface); border-radius: 12px;
            border: 1px solid var(--border); margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💧 Прозрачность жидкости</h1>
            <div id="datetime"></div>
        </div>
        
        <div class="video-wrapper" id="videoWrapper">
            <video id="video" autoplay playsinline muted></video>
            <div id="regionSelector" class="region-selector"></div>
        </div>
        
        <div class="controls">
            <button id="areaBtn" disabled>🎯 Область</button>
            <button id="resetBtn" class="btn-red" disabled>🔄 Сброс</button>
            <button id="calibrateLowBtn" class="btn-green" disabled>📏 Нижний предел</button>
            <button id="calibrateHighBtn" class="btn-gray" disabled>⬛ Верхний предел</button>
            <button id="recordBtn" class="btn-blue" disabled>📝 Записать</button>
        </div>
        
        <div class="controls">
            <button id="soundToggleBtn" class="btn-purple" disabled>🔊 Звук</button>
        </div>
        <div class="sound-indicator">
            <div class="sound-dot" id="soundDot"></div>
            <span id="soundStatus">Звук включён</span>
        </div>
        
        <!-- Ручной ввод пределов -->
        <div class="calibration-inputs">
            <label>Нижний (100%):</label>
            <input type="number" id="lowCalInput" placeholder="Авто" step="0.1">
            <label>Верхний (0%):</label>
            <input type="number" id="highCalInput" placeholder="Авто" step="0.1">
            <button id="applyCalBtn" class="btn-blue" style="flex:0 0 auto; min-width:50px;">✓</button>
        </div>
        
        <div class="threshold-row">
            <label for="threshold">⚠️ Порог WARNING:</label>
            <input type="number" id="threshold" value="30" min="0" max="100" step="1">
            <span>%</span>
        </div>
        
        <div id="warningMessage" class="warning-text"></div>
        
        <div class="result-card">
            <div class="stats">
                <span>Прозрачность <span class="value" id="transparencyValue">0%</span></span>
                <span>Яркость <span class="value" id="brightnessValue">0</span></span>
            </div>
            <div class="meter">
                <div class="meter-fill" id="meterFill" style="width: 0%;"></div>
                <div class="indicator" id="indicator" style="left: 0%;"></div>
            </div>
            <div id="statusText">Загрузка камеры...</div>
        </div>
        
        <canvas id="trendCanvas" class="trend-canvas" width="500" height="130"></canvas>
        
        <div class="history" id="historyContainer">
            <h3>📋 История измерений</h3>
            <div id="historyList"></div>
            <button class="clear-history" id="clearHistoryBtn">Очистить историю</button>
        </div>
    </div>

    <script>
        // DOM
        const video = document.getElementById('video');
        const areaBtn = document.getElementById('areaBtn');
        const resetBtn = document.getElementById('resetBtn');
        const calibrateLowBtn = document.getElementById('calibrateLowBtn');
        const calibrateHighBtn = document.getElementById('calibrateHighBtn');
        const recordBtn = document.getElementById('recordBtn');
        const soundToggleBtn = document.getElementById('soundToggleBtn');
        const transparencyEl = document.getElementById('transparencyValue');
        const brightnessEl = document.getElementById('brightnessValue');
        const indicatorEl = document.getElementById('indicator');
        const meterFill = document.getElementById('meterFill');
        const statusEl = document.getElementById('statusText');
        const regionSelector = document.getElementById('regionSelector');
        const thresholdInput = document.getElementById('threshold');
        const warningMsg = document.getElementById('warningMessage');
        const datetimeEl = document.getElementById('datetime');
        const historyList = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const trendCanvas = document.getElementById('trendCanvas');
        const ctxTrend = trendCanvas.getContext('2d');
        const lowCalInput = document.getElementById('lowCalInput');
        const highCalInput = document.getElementById('highCalInput');
        const applyCalBtn = document.getElementById('applyCalBtn');
        const soundDot = document.getElementById('soundDot');
        const soundStatusEl = document.getElementById('soundStatus');

        let stream = null, analysisRegion = null, isSelecting = false, animationId = null;
        let calibrationLow = null, calibrationHigh = null;
        let currentTransparency = 0, currentBrightness = 0, trendData = [];
        let audioCtx = null, soundEnabled = true, lastBeepTime = 0, beepInterval = 2000;

        // Инициализация аудио (разблокировка по первому взаимодействию)
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }
        }

        function playCalmBeep() {
            if (!soundEnabled || !audioCtx) return;
            const now = Date.now();
            if (now - lastBeepTime < beepInterval) return;
            lastBeepTime = now;
            
            const playTone = (freq, startTime, duration, volume) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, startTime);
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(volume, startTime + 0.05);
                gain.gain.linearRampToValueAtTime(0, startTime + duration);
                osc.start(startTime);
                osc.stop(startTime + duration);
            };
            
            const t = audioCtx.currentTime;
            playTone(440, t, 0.3, 0.08);
            playTone(554, t + 0.2, 0.25, 0.06);
            beepInterval = Math.max(800, 3000 - (currentTransparency * 30));
        }

        function updateDateTime() {
            datetimeEl.textContent = new Date().toLocaleString('ru-RU', { 
                day: '2-digit', month: '2-digit', year: 'numeric', 
                hour: '2-digit', minute: '2-digit', second: '2-digit' 
            });
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        function updateCalInputs() {
            lowCalInput.value = calibrationLow !== null ? calibrationLow.toFixed(1) : '';
            highCalInput.value = calibrationHigh !== null ? calibrationHigh.toFixed(1) : '';
        }

        function drawTrend() {
            ctxTrend.clearRect(0, 0, trendCanvas.width, trendCanvas.height);
            ctxTrend.fillStyle = '#282c34';
            ctxTrend.fillRect(0, 0, trendCanvas.width, trendCanvas.height);
            if (trendData.length < 2) return;
            const w = trendCanvas.width, h = trendCanvas.height;
            const points = trendData.slice(-30);
            const xStep = w / (points.length - 1);
            ctxTrend.beginPath(); ctxTrend.moveTo(0, h);
            for (let i = 0; i < points.length; i++) {
                ctxTrend.lineTo(i * xStep, h - (points[i].transparency / 100) * h);
            }
            ctxTrend.lineTo(w, h); ctxTrend.closePath();
            const g = ctxTrend.createLinearGradient(0, 0, 0, h);
            g.addColorStop(0, 'rgba(63,185,80,0.3)'); g.addColorStop(1, 'rgba(63,185,80,0)');
            ctxTrend.fillStyle = g; ctxTrend.fill();
            ctxTrend.beginPath(); ctxTrend.strokeStyle = '#3fb950'; ctxTrend.lineWidth = 2.5;
            for (let i = 0; i < points.length; i++) {
                const x = i * xStep, y = h - (points[i].transparency / 100) * h;
                i === 0 ? ctxTrend.moveTo(x, y) : ctxTrend.lineTo(x, y);
            }
            ctxTrend.stroke();
            const th = parseFloat(thresholdInput.value) || 30, yTh = h - (th / 100) * h;
            ctxTrend.beginPath(); ctxTrend.strokeStyle = '#f85149'; ctxTrend.lineWidth = 1.5;
            ctxTrend.setLineDash([6, 4]); ctxTrend.moveTo(0, yTh); ctxTrend.lineTo(w, yTh);
            ctxTrend.stroke(); ctxTrend.setLineDash([]);
        }

        function addTrendPoint(t) {
            trendData.push({ time: Date.now(), transparency: t });
            if (trendData.length > 60) trendData.shift();
            drawTrend();
        }

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: 'environment' }, width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
            } catch (e) {
                try { stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false }); }
                catch (err) { statusEl.textContent = '❌ Нет доступа к камере'; return; }
            }
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                statusEl.textContent = '✅ Камера работает';
                areaBtn.disabled = false;
                calibrateLowBtn.disabled = false;
                calibrateHighBtn.disabled = false;
                recordBtn.disabled = false;
                soundToggleBtn.disabled = false;
                startAnalysis();
            };
        }

        function getCoords(e) {
            const r = video.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - r.left, y: cy - r.top, rectWidth: r.width, rectHeight: r.height };
        }
        let sx, sy;
        function pd(e) { if(!isSelecting) return; e.preventDefault(); const p=getCoords(e); sx=p.x; sy=p.y;
            regionSelector.style.display='block'; regionSelector.style.left=p.x+'px'; regionSelector.style.top=p.y+'px';
            regionSelector.style.width='0px'; regionSelector.style.height='0px'; }
        function pm(e) { if(!isSelecting||sx===undefined) return; e.preventDefault(); const p=getCoords(e);
            regionSelector.style.left=Math.min(sx,p.x)+'px'; regionSelector.style.top=Math.min(sy,p.y)+'px';
            regionSelector.style.width=Math.abs(p.x-sx)+'px'; regionSelector.style.height=Math.abs(p.y-sy)+'px'; }
        function pu(e) { if(!isSelecting||sx===undefined) return; e.preventDefault(); const p=getCoords(e);
            const scX=video.videoWidth/p.rectWidth, scY=video.videoHeight/p.rectHeight;
            analysisRegion={ x:Math.min(sx,p.x)*scX, y:Math.min(sy,p.y)*scY, width:Math.abs(p.x-sx)*scX, height:Math.abs(p.y-sy)*scY };
            isSelecting=false; areaBtn.textContent='🎯 Область'; removeListeners(); }
        function addListeners() {
            video.addEventListener('mousedown',pd); video.addEventListener('mousemove',pm); video.addEventListener('mouseup',pu);
            video.addEventListener('touchstart',pd,{passive:false}); video.addEventListener('touchmove',pm,{passive:false}); video.addEventListener('touchend',pu);
        }
        function removeListeners() {
            video.removeEventListener('mousedown',pd); video.removeEventListener('mousemove',pm); video.removeEventListener('mouseup',pu);
            video.removeEventListener('touchstart',pd); video.removeEventListener('touchmove',pm); video.removeEventListener('touchend',pu);
        }

        areaBtn.addEventListener('click', () => {
            if(isSelecting) { isSelecting=false; areaBtn.textContent='🎯 Область'; regionSelector.style.display='none'; removeListeners(); return; }
            if(!stream) return; isSelecting=true; areaBtn.textContent='✋ Отменить'; addListeners();
        });

        resetBtn.addEventListener('click', () => {
            analysisRegion=null; regionSelector.style.display='none';
            calibrationLow=null; calibrationHigh=null; updateCalInputs();
            statusEl.textContent='🔄 Всё сброшено';
        });

        calibrateLowBtn.addEventListener('click', () => {
            if(!stream) return; initAudio();
            calibrationLow=currentBrightness; updateCalInputs();
            statusEl.textContent=`📏 Нижний предел (100%): ${calibrationLow.toFixed(1)}`;
            if(calibrationHigh!==null && calibrationHigh>=calibrationLow)
                statusEl.textContent+=' ⚠️ Верхний предел ярче нижнего!';
        });

        calibrateHighBtn.addEventListener('click', () => {
            if(!stream) return; initAudio();
            if(calibrationLow!==null && currentBrightness>=calibrationLow) {
                statusEl.textContent='❌ Верхний предел не может быть ярче нижнего!'; return;
            }
            calibrationHigh=currentBrightness; updateCalInputs();
            statusEl.textContent=`⬛ Верхний предел (0%): ${calibrationHigh.toFixed(1)}`;
        });

        // Ручной ввод пределов
        applyCalBtn.addEventListener('click', () => {
            initAudio();
            const lowVal = parseFloat(lowCalInput.value);
            const highVal = parseFloat(highCalInput.value);
            
            if (!isNaN(lowVal)) {
                calibrationLow = lowVal;
                statusEl.textContent = `📏 Нижний предел задан вручную: ${lowVal.toFixed(1)}`;
            }
            if (!isNaN(highVal)) {
                if (calibrationLow !== null && highVal >= calibrationLow) {
                    statusEl.textContent = '❌ Верхний предел не может быть ярче нижнего!';
                    return;
                }
                calibrationHigh = highVal;
                statusEl.textContent = `⬛ Верхний предел задан вручную: ${highVal.toFixed(1)}`;
            }
            if (!isNaN(lowVal) && !isNaN(highVal) && highVal < lowVal) {
                statusEl.textContent = '✅ Оба предела заданы вручную';
            }
            updateCalInputs();
        });

        function addHistoryRecord() {
            const now = new Date();
            const th = parseFloat(thresholdInput.value) || 30;
            const w = currentTransparency < th ? '⚠️' : '✅';
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>${now.toLocaleTimeString('ru-RU')}</span> <span style="color:#3fb950">${currentTransparency.toFixed(1)}%</span> <span>${w}</span>`;
            historyList.prepend(div);
        }
        recordBtn.addEventListener('click', () => { if(!stream) return; addHistoryRecord(); });
        clearHistoryBtn.addEventListener('click', () => historyList.innerHTML = '');

        soundToggleBtn.addEventListener('click', () => {
            initAudio();
            soundEnabled = !soundEnabled;
            soundToggleBtn.textContent = soundEnabled ? '🔊 Звук' : '🔇 Без звука';
            soundDot.classList.toggle('muted', !soundEnabled);
            soundStatusEl.textContent = soundEnabled ? 'Звук включён' : 'Звук выключен';
        });

        function analyzeFrame() {
            if(!stream || video.readyState < 2) { animationId = requestAnimationFrame(analyzeFrame); return; }
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d'); ctx.drawImage(video, 0, 0);
            
            let img;
            if(analysisRegion) {
                const rx=Math.max(0,Math.min(analysisRegion.x,canvas.width-1)), ry=Math.max(0,Math.min(analysisRegion.y,canvas.height-1));
                const rw=Math.max(1,Math.min(analysisRegion.width,canvas.width-rx)), rh=Math.max(1,Math.min(analysisRegion.height,canvas.height-ry));
                img = ctx.getImageData(rx, ry, rw, rh);
            } else img = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            const data = img.data; let total = 0;
            for(let i=0; i<data.length; i+=4) total += 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
            currentBrightness = total / (data.length/4);
            
            if(calibrationLow!==null && calibrationHigh!==null && calibrationLow>calibrationHigh)
                currentTransparency = ((currentBrightness-calibrationHigh)/(calibrationLow-calibrationHigh))*100;
            else if(calibrationLow!==null)
                currentTransparency = (currentBrightness/calibrationLow)*100;
            else
                currentTransparency = (currentBrightness/255)*100;
            currentTransparency = Math.max(0, Math.min(100, currentTransparency));
            
            transparencyEl.textContent = currentTransparency.toFixed(1)+'%';
            brightnessEl.textContent = currentBrightness.toFixed(1);
            indicatorEl.style.left = currentTransparency+'%';
            meterFill.style.width = currentTransparency+'%';
            
            const threshold = parseFloat(thresholdInput.value)||30;
            if(currentTransparency < threshold) {
                warningMsg.textContent = '⚠️ WARNING: Прозрачность ниже порога!';
                warningMsg.classList.add('active');
                playCalmBeep();
            } else {
                warningMsg.textContent = '';
                warningMsg.classList.remove('active');
            }
            addTrendPoint(currentTransparency);
            animationId = requestAnimationFrame(analyzeFrame);
        }

        function startAnalysis() {
            if(animationId) cancelAnimationFrame(animationId);
            analyzeFrame();
        }

        // Разблокировка AudioContext по первому клику/касанию
        document.addEventListener('click', initAudio, { once: true });
        document.addEventListener('touchstart', initAudio, { once: true });

        window.addEventListener('load', () => {
            if(!navigator.mediaDevices?.getUserMedia) { statusEl.textContent='❌ Браузер не поддерживает камеру'; return; }
            startCamera();
        });
        window.addEventListener('beforeunload', () => {
            if(stream) stream.getTracks().forEach(t=>t.stop());
        });
    </script>
</body>
</html>
